- job-template:
    id: "tf-a-gerrit-tforg-l1"
    project-type: "multijob"

    name: "{base}-gerrit-tforg-l1"
    node: "{node}"

    description: |
      Automated validation for patches submitted to <strong>{label}</strong>,
      limited to low-intensity test suites only.

    concurrent: true
    disabled: false

    rf_a_project: "RF-A/rusted-firmware-a"
    rf_a_branch: "main"

    tftf_project: "TF-A/tf-a-tests"
    tftf_branch: "master"

    tf_m_tests_project: "TF-M/tf-m-tests"
    tf_m_tests_branch: "tfa_ci_dep_revision"

    tf_m_extras_project: "TF-M/tf-m-extras"
    tf_m_extras_branch: "tfa_ci_dep_revision"

    hafnium_project: "hafnium/hafnium"
    hafnium_branch: "master"

    tf_rmm_project: "TF-RMM/tf-rmm"
    tf_rmm_branch: "main"

    tfut_project: "TF-A/tf-a-unit-tests"
    tfut_branch: "main"

    tf_a_ci_scripts_project: "ci/tf-a-ci-scripts"
    tf_a_ci_scripts_branch: "master"
    tf_a_ci_scripts_mbed_tls_version: "3.6.5"
    tf_a_ci_scripts_test_suffix: ""

    tf_a_ci_jobs_project: "ci/tf-a-job-configs"
    tf_a_ci_jobs_branch: "master"

    properties:
      - "tf-a-clone-properties"

      - tf-a-ci-scripts:
          download_server_url: "https://downloads.trustedfirmware.org"
          download_server_tf_a_url: "https://downloads.trustedfirmware.org/{downloads_space}"

      - build-discarder:
          days-to-keep: 30

    parameters:
      - tf-a-gerrit-comment-added-parameters:
          gerrit_project: "{gerrit_project_prefix}TF-A/trusted-firmware-a"
          gerrit_branch: "{gerrit_branch}"
          gerrit_refspec: "{gerrit_refspec}"

      - tf-a-builder-parameters:
          tf_a_project: "${{GERRIT_PROJECT}}"
          tf_a_branch: "${{GERRIT_REFSPEC}}"

          rf_a_project: "{rf_a_project}"
          rf_a_branch: "{rf_a_branch}"

          tftf_project: "{tftf_project}"
          tftf_branch: "{tftf_branch}"

          tf_m_tests_project: "{tf_m_tests_project}"
          tf_m_tests_branch: "{tf_m_tests_branch}"

          tf_m_extras_project: "{tf_m_extras_project}"
          tf_m_extras_branch: "{tf_m_extras_branch}"

          hafnium_project: "{hafnium_project}"
          hafnium_branch: "{hafnium_branch}"

          tf_rmm_project: "{tf_rmm_project}"
          tf_rmm_branch: "{tf_rmm_branch}"

          tfut_project: "{tfut_project}"
          tfut_branch: "{tfut_branch}"

          tf_a_ci_scripts_project: "{tf_a_ci_scripts_project}"
          tf_a_ci_scripts_branch: "{tf_a_ci_scripts_branch}"
          tf_a_ci_scripts_mbed_tls_version: "{tf_a_ci_scripts_mbed_tls_version}"

          tf_a_ci_jobs_project: "{tf_a_ci_jobs_project}"
          tf_a_ci_jobs_branch: "{tf_a_ci_jobs_branch}"

    wrappers:
      - timestamps:

    builders:
      - multijob:
          name: "Lint commit messages"
          condition: "COMPLETED"

          projects:
            - name: "tf-a-commitlint"
              kill-phase-on: "NEVER"

              predefined-parameters: |
                URL=https://review.trustedfirmware.org/${{GERRIT_PROJECT}}
                REFSPEC=${{GERRIT_REFSPEC}}
                REFNAME=${{GERRIT_PATCHSET_REVISION}}
                REFNAME_BASE=origin/${{GERRIT_BRANCH}}

      - multijob:
          condition: "COMPLETED"
          name: "Build and static checks"

          projects:
            - kill-phase-on: "NEVER"
              name: "tf-a-static-checks"
              current-parameters: true

              predefined-parameters: |-
                TEST_GROUPS=tf-l2-scan-build{tf_a_ci_scripts_test_suffix|}

      - multijob:
          condition: "COMPLETED"
          name: "Run doc build check"

          projects:
            - kill-phase-on: "NEVER"
              name: "{base}-ci-gateway"
              current-parameters: true

              predefined-parameters: |
                TEST_GROUPS=tf-l1-check-docs{tf_a_ci_scripts_test_suffix|}

      - multijob:
          condition: "COMPLETED"
          name: "Run build tests"

          projects:
            - kill-phase-on: "NEVER"
              name: "{base}-ci-gateway"
              current-parameters: true

              predefined-parameters: |
                TEST_GROUPS=tf-l1-build-fvp{tf_a_ci_scripts_test_suffix|} tf-l1-build-juno{tf_a_ci_scripts_test_suffix|} tf-l1-build-clang{tf_a_ci_scripts_test_suffix|} tf-l1-build-plat{tf_a_ci_scripts_test_suffix|} spm-l1-build-tests{tf_a_ci_scripts_test_suffix|}

    triggers:
      - gerrit:
          server-name: "review.trustedfirmware.org"

          trigger-on:
            - comment-added-event:
                approval-category: "Allow-CI"
                approval-value: 1

          projects:
            - project-compare-type: "PLAIN"
              project-pattern: "{gerrit_project_prefix}TF-A/trusted-firmware-a"

              branches:
                - branch-compare-type: "PLAIN"
                  branch-pattern: "{gerrit_refspec}"

          override-votes: true
          gerrit-build-started-verified-value: 0
          gerrit-build-successful-verified-value: 1
          gerrit-build-failed-verified-value: -1
          gerrit-build-unstable-verified-value: -1
          gerrit-build-notbuilt-verified-value: 0
          gerrit-build-started-codereview-value: 0
          gerrit-build-successful-codereview-value: 0
          gerrit-build-failed-codereview-value: 0
          gerrit-build-unstable-codereview-value: 0
          gerrit-build-notbuilt-codereview-value: 0
