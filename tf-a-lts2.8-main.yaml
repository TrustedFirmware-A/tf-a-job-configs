- job:
    name: "tf-a-lts2.8-main"
    node: "docker-amd64-tf-a-lts2.8-jammy"
    project-type: "multijob"
    concurrent: true
    disabled: false
    description: "Main CI job for Trusted Firmware."

    properties:
      - tf-a-ci-scripts:
          download_server_url: "https://downloads.trustedfirmware.org"
          download_server_tf_a_url: "https://downloads.trustedfirmware.org/tf-a-lts-v2.8"

      - build-discarder:
          days-to-keep: 30

    parameters:
      - tf-a-gerrit-change-based-patchset-parameters:
          gerrit_project: "{gerrit_project_prefix}TF-A/trusted-firmware-a"
          gerrit_branch: "lts-v2.8"
          gerrit_refspec: "lts-v2.8"

      - tf-a-builder-parameters:
          tf_a_project: "${{GERRIT_PROJECT}}"
          tf_a_branch: "${{GERRIT_REFSPEC}}"

          rf_a_project: "RF-A/rusted-firmware-a"
          rf_a_branch: "main"

          tftf_project: "{gerrit_project_prefix}TF-A/tf-a-tests"
          tftf_branch: "lts-v2.8"

          tf_m_tests_project: "TF-M/tf-m-tests"
          tf_m_tests_branch: "tfa_ci_dep_revision"

          tf_m_extras_project: "TF-M/tf-m-extras"
          tf_m_extras_branch: "tfa_ci_dep_revision"

          hafnium_project: "hafnium/hafnium"
          hafnium_branch: "master"

          tf_rmm_project: "TF-RMM/tf-rmm"
          tf_rmm_branch: "main"

          tfut_project: "TF-A/tf-a-unit-tests"
          tfut_branch: "main"

          tf_a_ci_scripts_project: "ci/tf-a-ci-scripts"
          tf_a_ci_scripts_branch: "master"
          tf_a_ci_scripts_mbed_tls_version: "3.6.4"

          lava_priority: "medium"

    triggers:
      - timed: "H H(0-7) * * 3,6"

    wrappers:
      - timestamps:

    builders:
      - multijob:
          name: "Run static checks on the code"
          condition: "COMPLETED"

          projects:
            - name: "tf-a-static-checks"
              current-parameters: true
              kill-phase-on: "NEVER"

      - multijob:
          name: "Build Trusted Firmware"
          condition: "COMPLETED"

          projects:
            - name: "tf-a-lts2.8-ci-gateway"
              alias: "tf-l1-build-fvp tf-l2-build-fvp"
              current-parameters: true
              kill-phase-on: "NEVER"

              predefined-parameters: |
                TEST_GROUPS=tf-l1-build-fvp-lts-v2.8 tf-l2-build-fvp-lts-v2.8

            - name: "tf-a-lts2.8-ci-gateway"
              alias: "tf-l1-build-juno tf-l2-build-juno"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-l1-build-juno-lts-v2.8 tf-l2-build-juno-lts-v2.8"

            - name: "tf-a-lts2.8-ci-gateway"
              alias: "tf-l1-build-plat"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-l1-build-plat-lts-v2.8"

            - name: "tf-a-lts2.8-ci-gateway"
              alias: "tf-l1-build-clang"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-l1-build-clang-lts-v2.8"

      - multijob:
          name: "Build Trusted Firmware Test Framework"
          condition: "COMPLETED"

          projects:
            - current-parameters: true
              kill-phase-on: "NEVER"
              name: "tf-a-lts2.8-ci-gateway"
              alias: "tftf-l1-build"
              predefined-parameters: "TEST_GROUPS=tftf-l1-build-lts-v2.8"

      - multijob:
          name: "TFTF Tests for FVP"
          condition: "COMPLETED"

          projects:
            - name: "tf-a-lts2.8-ci-gateway"
              alias: "tftf-l2-fwu"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tftf-l2-fwu-lts-v2.8"

            - name: "tf-a-lts2.8-ci-gateway"
              alias: "tftf-l1-fvp tftf-l2-fvp-auxiliary"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tftf-l1-fvp-lts-v2.8 tftf-l2-fvp-auxiliary-lts-v2.8"

            - name: "tf-a-lts2.8-ci-gateway"
              alias: "tftf-l2-fvp tftf-l2-fvp-dynamiq"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tftf-l2-fvp-lts-v2.8 tftf-l2-fvp-dynamiq-lts-v2.8"

            - name: "tf-a-lts2.8-ci-gateway"
              alias: "tftf-l2-extensive-tests-fvp"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tftf-l2-extensive-tests-fvp-lts-v2.8"

      - multijob:
          name: "Boot up to the Linux shell prompt"
          condition: "COMPLETED"

          projects:
            - name: "tf-a-lts2.8-ci-gateway"
              alias: "tf-l2-boot-tests-aarch32"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-l2-boot-tests-aarch32-lts-v2.8"

            - name: "tf-a-lts2.8-ci-gateway"
              alias: "tf-l2-boot-tests-rootfs"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-l2-boot-tests-rootfs-lts-v2.8"

            - name: "tf-a-lts2.8-ci-gateway"
              alias: "tf-l2-boot-tests-spm-mm"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-l2-boot-tests-spm-mm-lts-v2.8"

            - name: "tf-a-lts2.8-ci-gateway"
              alias: "spm-l2-boot-tests"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=spm-l2-boot-tests-lts-v2.8"

      - multijob:
          name: "Boot up to the Linux shell prompt - Part 2"
          condition: "COMPLETED"

          projects:
            - name: "tf-a-lts2.8-ci-gateway"
              alias: "tf-l2-boot-tests-misc"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-l2-boot-tests-misc-lts-v2.8"

            - name: "tf-a-lts2.8-ci-gateway"
              alias: "tf-l2-boot-tests-latest"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-l2-boot-tests-latest-lts-v2.8"

            - name: "tf-a-lts2.8-ci-gateway"
              alias: "tf-l2-boot-tests-cortex"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-l2-boot-tests-cortex-lts-v2.8"

            - name: "tf-a-lts2.8-ci-gateway"
              alias: "tf-l2-boot-tests-gicv2"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-l2-boot-tests-gicv2-lts-v2.8"

            - name: "tf-a-lts2.8-ci-gateway"
              alias: "tf-l2-boot-tests-bl2_el3"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-l2-boot-tests-bl2_el3-lts-v2.8"

            - name: "tf-a-lts2.8-ci-gateway"
              alias: "qemu-boot-tests"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=qemu-boot-tests-lts-v2.8"

      - multijob:
          name: "Juno Boot Tests"
          condition: "COMPLETED"

          projects:
            - name: "tf-a-lts2.8-ci-gateway"
              alias: "tf-l2-boot-tests-juno"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-l2-boot-tests-juno-lts-v2.8"

            - name: "tf-a-lts2.8-ci-gateway"
              alias: "tftf-l1-juno"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tftf-l1-juno-lts-v2.8"

      - multijob:
          name: "Miscellaneous tests"
          condition: "COMPLETED"

          projects:
            - name: "tf-a-lts2.8-ci-gateway"
              alias: "tf-l3-boot-tests-css"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-l3-boot-tests-css-lts-v2.8"

            - name: "tf-a-lts2.8-ci-gateway"
              alias: "tf-l3-boot-tests-spm-mm"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-l3-boot-tests-spm-mm-lts-v2.8"

            - name: "tf-a-lts2.8-ci-gateway"
              alias: "tf-l3-boot-tests-ras"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-l3-boot-tests-ras-lts-v2.8"

            - name: "tf-a-lts2.8-ci-gateway"
              alias: "tf-l3-boot-tests-misc"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-l3-boot-tests-misc-lts-v2.8"

            - name: "tf-a-lts2.8-ci-gateway"
              alias: "spm-l3-boot-tests"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=spm-l3-boot-tests-lts-v2.8"

            - name: "tf-a-lts2.8-ci-gateway"
              alias: "tf-l1-boot-tests-plat"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-l1-boot-tests-plat-lts-v2.8"

      - multijob:
          name: "Run doc build check"
          condition: "COMPLETED"

          projects:
            - name: "tf-a-lts2.8-ci-gateway"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-l1-check-docs-lts-v2.8"

      - multijob:
          name: "Generate visualizations"
          condition: "COMPLETED"

          projects:
            #                  - name: tf-a-sloc-visualization
            #                    current-parameters: true
            #                    kill-phase-on: NEVER
            #                    property-file: tf-a-env.param
            #                  - name: tf-a-test-category-visualization
            #                    current-parameters: true
            #                    kill-phase-on: NEVER
            #                    property-file: tf-a-env.param
            - name: "tf-a-test-result-visualization"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TARGET_BUILD=${{JOB_NAME}}/${{BUILD_NUMBER}}"

      # Run the unstable TF-A Tests at the end but do not let their results
      # participate in the job's success/failure.
      - trigger-builds:
          - project: "tf-a-lts2.8-ci-gateway"
            current-parameters: True
            predefined-parameters: "TEST_GROUPS=tftf-unstable-lts-v2.8"
            block: True

            block-thresholds:
              build-step-failure-threshold: "never"
              unstable-threshold: "never"
              failure-threshold: "never"
