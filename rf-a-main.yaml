- job:
    name: "rf-a-main"
    node: "docker-amd64-tf-a-jammy"
    project-type: "multijob"
    concurrent: true
    disabled: false
    description: "Main CI job for Rusted Firmware A"

    properties:
      - "tf-a-clone-properties"

      - tf-a-ci-scripts:
          download_server_url: "https://downloads.trustedfirmware.org"
          download_server_tf_a_url: "https://downloads.trustedfirmware.org/tf-a"

      - build-discarder:
          days-to-keep: 30

    triggers:
      - gerrit:
          server-name: "review.trustedfirmware.org"

          projects:
            - branches:
                - branch-compare-type: "PLAIN"
                  branch-pattern: "main"

              project-compare-type: "PLAIN"
              project-pattern: "{gerrit_project_prefix}RF-A/rusted-firmware-a"

          trigger-on:
            - patchset-created-event:
                exclude-drafts: true
                exclude-trivial-rebase: true
                exclude-no-code-change: true
                exclude-private: true
                exclude-wip: true

            - comment-added-contains-event:
                comment-contains-value: "^RUN_CI$"

          override-votes: true
          gerrit-build-started-verified-value: 0
          gerrit-build-successful-verified-value: 1
          gerrit-build-failed-verified-value: -1
          gerrit-build-unstable-verified-value: -1
          gerrit-build-notbuilt-verified-value: 0
          # without explicitly setting these values to 0, the plugin will by
          # default leave Code Review votes
          gerrit-build-started-codereview-value: 0
          gerrit-build-successful-codereview-value: 0
          gerrit-build-failed-codereview-value: 0
          gerrit-build-unstable-codereview-value: 0
          gerrit-build-notbuilt-codereview-value: 0
          silent: false
          silent-start: false

    parameters:
      - tf-a-gerrit-comment-added-contains-parameters:
          gerrit_project: "RF-A/rusted-firmware-a"
          gerrit_branch: "main"
          gerrit_refspec: "main"

      - tf-a-builder-parameters:
          tf_a_project: "TF-A/trusted-firmware-a"
          tf_a_branch: "master"

          rf_a_project: "${{GERRIT_PROJECT}}"
          rf_a_branch: "${{GERRIT_REFSPEC}}"

          tftf_project: "TF-A/tf-a-tests"
          tftf_branch: "master"

          tf_m_tests_project: "TF-M/tf-m-tests"
          tf_m_tests_branch: "tfa_ci_dep_revision"

          tf_m_extras_project: "TF-M/tf-m-extras"
          tf_m_extras_branch: "tfa_ci_dep_revision"

          hafnium_project: "hafnium/hafnium"
          hafnium_branch: "master"

          tf_rmm_project: "TF-RMM/tf-rmm"
          tf_rmm_branch: "main"

          tfut_project: "TF-A/tf-a-unit-tests"
          tfut_branch: "main"

          tf_a_ci_scripts_project: "ci/tf-a-ci-scripts"
          tf_a_ci_scripts_branch: "master"
          tf_a_ci_scripts_mbed_tls_version: "3.6.5"

          lava_priority: "medium"

    wrappers:
      - credentials-binding:
          - ssh-user-private-key:
              credential-id: "TFA_CI_BOT_USER_SSH_KEY"
              key-file-variable: "CI_BOT_KEY"
              username-variable: "CI_BOT_USERNAME"
              passphrase-variable: ""

      - "timestamps"

    builders:
      - multijob:
          name: "Lint commit messages"
          condition: "COMPLETED"

          projects:
            - name: "rf-a-commitlint"
              kill-phase-on: "NEVER"

              predefined-parameters: |
                REFSPEC=${{GERRIT_REFSPEC}}
                REFNAME=${{GERRIT_PATCHSET_REVISION}}
                REFNAME_BASE=origin/${{GERRIT_BRANCH}}

      - multijob:
          name: "Code formatting, static checks and lints"
          condition: "COMPLETED"

          projects:
            - name: "rf-a-static"
              current-parameters: true
              kill-phase-on: "NEVER"

      - multijob:
          name: "Platform independent tests"
          condition: "COMPLETED"

          projects:
            - name: "rf-a-crate-generic-lib-testing"
              current-parameters: true
              kill-phase-on: "NEVER"

              predefined-parameters: |
                TEST_REPO_NAME=rusted-firmware-a
                TEST_REPO_PROJECT=RF-A

      - multijob:
          name: "Run build tests"
          condition: "COMPLETED"

          projects:
            - name: "rf-a-ci-gateway"
              alias: "rf-a-l1-build-arm-fvp"
              current-parameters: true
              kill-phase-on: "NEVER"

              predefined-parameters: |
                TEST_GROUPS=rf-a-l1-build-arm-fvp

            - name: "rf-a-ci-gateway"
              alias: "rf-a-l1-build-qemu"
              current-parameters: true
              kill-phase-on: "NEVER"

              predefined-parameters: |
                TEST_GROUPS=rf-a-l1-build-qemu

      - multijob:
          name: "Run integration tests"
          condition: "COMPLETED"

          projects:
            - name: "rf-a-ci-gateway"
              alias: "rf-a-l2-integration-arm-fvp"
              current-parameters: true
              kill-phase-on: "NEVER"

              predefined-parameters: |
                TEST_GROUPS=rf-a-l2-integration-arm-fvp

            - name: "rf-a-ci-gateway"
              alias: "rf-a-l2-integration-bti-arm-fvp"
              current-parameters: true
              kill-phase-on: "NEVER"

              predefined-parameters: |
                TEST_GROUPS=rf-a-l2-integration-bti-arm-fvp

            - name: "rf-a-ci-gateway"
              alias: "rf-a-l2-integration-rme-arm-fvp"
              current-parameters: true
              kill-phase-on: "NEVER"

              predefined-parameters: |
                TEST_GROUPS=rf-a-l2-integration-rme-arm-fvp

      - multijob:
          name: "Run functional tests"
          condition: "COMPLETED"

          projects:
            - name: "rf-a-ci-gateway"
              alias: "rf-a-l2-functional-tftf-arm-fvp"
              current-parameters: true
              kill-phase-on: "NEVER"

              predefined-parameters: |
                TEST_GROUPS=rf-a-l2-functional-tftf-arm-fvp

            - name: "rf-a-ci-gateway"
              alias: "rf-a-l2-functional-tftf-undef-injection-arm-fvp"
              current-parameters: true
              kill-phase-on: "NEVER"

              predefined-parameters: |
                TEST_GROUPS=rf-a-l2-functional-tftf-undef-injection-arm-fvp
