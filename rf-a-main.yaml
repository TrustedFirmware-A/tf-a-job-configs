- job:
    name: "rf-a-main"
    node: "docker-amd64-tf-a-jammy"
    project-type: "multijob"
    concurrent: true
    disabled: false
    description: "Main CI job for Rusted Firmware A"

    properties:
      - "tf-a-clone-properties"

      - tf-a-ci-scripts:
          download_server_url: "https://downloads.trustedfirmware.org"
          download_server_tf_a_url: "https://downloads.trustedfirmware.org/tf-a"

      - throttle:
          option: "project"
          enabled: true
          max-total: 5

      - build-discarder:
          days-to-keep: 30

    triggers:
      - gerrit:
          server-name: "review.trustedfirmware.org"

          projects:
            - branches:
                - branch-compare-type: "PLAIN"
                  branch-pattern: "main"

              project-compare-type: "PLAIN"
              project-pattern: "{gerrit_project_prefix}RF-A/rusted-firmware-a"

          trigger-on:
            - patchset-created-event:
                exclude-drafts: true
                exclude-trivial-rebase: true
                exclude-no-code-change: true
                exclude-private: true
                exclude-wip: true

            - comment-added-contains-event:
                comment-contains-value: "^RUN_CI$"

          override-votes: true
          gerrit-build-started-verified-value: 0
          gerrit-build-successful-verified-value: 1
          gerrit-build-failed-verified-value: -1
          gerrit-build-unstable-verified-value: -1
          gerrit-build-notbuilt-verified-value: 0
          # without explicitly setting these values to 0, the plugin will by
          # default leave Code Review votes
          gerrit-build-started-codereview-value: 0
          gerrit-build-successful-codereview-value: 0
          gerrit-build-failed-codereview-value: 0
          gerrit-build-unstable-codereview-value: 0
          gerrit-build-notbuilt-codereview-value: 0
          silent: false
          silent-start: false

    parameters:
      - tf-a-builder-parameters:
          default_gerrit_project: "{gerrit_project_prefix}RF-A/rusted-firmware-a"
          default_gerrit_branch: "main"

          default_tf_a_project: "{gerrit_project_prefix}TF-A/trusted-firmware-a"
          default_tf_a_branch: "master"
          default_tf_a_mbedtls_version: "3.6.5"

          default_rf_a_project: "${{GERRIT_PROJECT}}"
          default_rf_a_branch: "${{GERRIT_REFSPEC}}"

          default_tftf_project: "{gerrit_project_prefix}TF-A/tf-a-tests"
          default_tftf_branch: "master"

          default_tf_m_tests_project: "{gerrit_project_prefix}TF-M/tf-m-tests"
          default_tf_m_tests_branch: "tfa_ci_dep_revision"

          default_tf_m_extras_project: "{gerrit_project_prefix}TF-M/tf-m-extras"
          default_tf_m_extras_branch: "tfa_ci_dep_revision"

          default_hafnium_project: "{gerrit_project_prefix}hafnium/hafnium"
          default_hafnium_branch: "master"

          default_tf_rmm_project: "{gerrit_project_prefix}TF-RMM/tf-rmm"
          default_tf_rmm_branch: "main"

          default_tfut_project: "{gerrit_project_prefix}TF-A/tf-a-unit-tests"
          default_tfut_branch: "main"

          default_tf_a_ci_scripts_project: "{gerrit_project_prefix}ci/tf-a-ci-scripts"
          default_tf_a_ci_scripts_branch: "master"

          default_tf_a_ci_jobs_project: "{gerrit_project_prefix}ci/tf-a-job-configs.git"
          default_tf_a_ci_jobs_branch: "master"

    wrappers:
      - credentials-binding:
          - ssh-user-private-key:
              credential-id: "TFA_CI_BOT_USER_SSH_KEY"
              key-file-variable: "CI_BOT_KEY"
              username-variable: "CI_BOT_USERNAME"
              passphrase-variable: ""

      - "timestamps"

    builders:
      - shell: |
          #!/bin/bash
          set -e
          cat << EOF > tf-a-env.param
          RF_GERRIT_PROJECT=${{GERRIT_PROJECT}}
          RFA_REFSPEC=${{RFA_REFSPEC}}
          GERRIT_REFSPEC=${{GERRIT_REFSPEC}}
          GERRIT_BRANCH=${{GERRIT_BRANCH}}
          TF_GERRIT_PROJECT=${{GERRIT_PROJECT_PREFIX:-}}TF-A/trusted-firmware-a
          TF_GERRIT_REFSPEC=${{TF_GERRIT_REFSPEC}}
          EOF

      - multijob:
          name: "Lint commit messages"
          condition: "COMPLETED"

          projects:
            - name: "rf-a-commitlint"
              kill-phase-on: "NEVER"

              predefined-parameters: |
                REFSPEC=${{GERRIT_REFSPEC}}
                REFNAME=${{GERRIT_PATCHSET_REVISION}}
                REFNAME_BASE=origin/${{GERRIT_BRANCH}}

      - multijob:
          name: "Code formatting, static checks and lints"
          condition: "COMPLETED"

          projects:
            - name: "rf-a-static"
              current-parameters: true
              kill-phase-on: "NEVER"

              predefined-parameters: |
                GERRIT_BRANCH=${{GERRIT_BRANCH}}
                RFA_REFSPEC=${{RFA_REFSPEC}}
                GERRIT_REFSPEC=${{GERRIT_REFSPEC}}

              property-file: "tf-a-env.param"

      - multijob:
          name: "Platform independent tests"
          condition: "COMPLETED"

          projects:
            - name: "rf-a-crate-generic-lib-testing"
              kill-phase-on: "NEVER"

              predefined-parameters: |
                GERRIT_PROJECT=${{GERRIT_PROJECT}}
                GERRIT_REFSPEC=${{GERRIT_REFSPEC}}
                CI_GERRIT_PROJECT=${{CI_GERRIT_PROJECT}}
                CI_REFSPEC=${{CI_REFSPEC}}
                TEST_REPO_NAME=rusted-firmware-a
                TEST_REPO_PROJECT=RF-A

      - multijob:
          name: "Build Rusted Firmware A"
          condition: "COMPLETED"

          projects:
            - name: "rf-a-ci-gateway"
              alias: "rfa-build"
              current-parameters: true
              kill-phase-on: "NEVER"

              predefined-parameters: |
                TEST_GROUPS=rfa-build
                RFA_REFSPEC=$RFA_REFSPEC

              property-file: "tf-a-env.param"

      - multijob:
          name: "FVP Tests"
          condition: "COMPLETED"

          projects:
            - name: "rf-a-ci-gateway"
              alias: "rfa-fvp"
              current-parameters: true
              kill-phase-on: "NEVER"

              predefined-parameters: |
                TEST_GROUPS=rfa-fvp
                RFA_REFSPEC=$RFA_REFSPEC

              property-file: "tf-a-env.param"
