- job:
    name: "tf-a-lts2.12-tftf-gerrit-tforg-l2"
    node: "docker-amd64-tf-a-lts2.12-jammy"
    project-type: "multijob"
    concurrent: true
    disabled: false

    description: |
      Job that triggers for every TF-A-Tests patch approved with the Allow-CI+2
      label on review.trustedfirmware.org.

    properties:
      - "tf-a-clone-properties"

      - tf-a-ci-scripts:
          download_server_url: "https://downloads.trustedfirmware.org"
          download_server_tf_a_url: "https://downloads.trustedfirmware.org/tf-a-lts-v2.12"

      - build-discarder:
          days-to-keep: 30

    parameters:
      - tf-a-gerrit-comment-added-parameters:
          gerrit_project: "{gerrit_project_prefix}TF-A/tf-a-tests"
          gerrit_branch: "lts-v2.12"
          gerrit_refspec: "lts-v2.12"

      - tf-a-builder-parameters:
          tf_a_project: "TF-A/trusted-firmware-a"
          tf_a_branch: "lts-v2.12"

          rf_a_project: "RF-A/rusted-firmware-a"
          rf_a_branch: "main"

          tftf_project: "${{GERRIT_PROJECT}}"
          tftf_branch: "${{GERRIT_REFSPEC}}"

          tf_m_tests_project: "TF-M/tf-m-tests"
          tf_m_tests_branch: "tfa_ci_dep_revision"

          tf_m_extras_project: "TF-M/tf-m-extras"
          tf_m_extras_branch: "tfa_ci_dep_revision"

          hafnium_project: "hafnium/hafnium"
          hafnium_branch: "master"

          tf_rmm_project: "TF-RMM/tf-rmm"
          tf_rmm_branch: "main"

          tfut_project: "TF-A/tf-a-unit-tests"
          tfut_branch: "main"

          tf_a_ci_scripts_project: "ci/tf-a-ci-scripts"
          tf_a_ci_scripts_branch: "master"
          tf_a_ci_scripts_mbed_tls_version: "3.6.3"

          lava_priority: "medium"

    wrappers:
      - credentials-binding:
          - ssh-user-private-key:
              credential-id: "TFA_CI_BOT_USER_SSH_KEY"
              key-file-variable: "CI_BOT_KEY"
              username-variable: "CI_BOT_USERNAME"
              passphrase-variable: ""

      - "timestamps"

    builders:
      - multijob:
          condition: "COMPLETED"
          name: "Carry out level 1 tests"

          projects:
            - kill-phase-on: "NEVER"
              name: "tf-a-lts2.12-tftf-gerrit-tforg-l1"
              current-parameters: true

      - multijob:
          condition: "COMPLETED"
          name: "Run Firmware Update Tests"

          projects:
            - kill-phase-on: "NEVER"
              name: "tf-a-lts2.12-ci-gateway"
              current-parameters: true

              predefined-parameters: |-
                TEST_GROUPS=tftf-l2-fwu-lts-v2.12

      - multijob:
          condition: "COMPLETED"
          name: "Run Level 2 testing of TF-A-Tests"

          projects:
            - kill-phase-on: "NEVER"
              name: "tf-a-lts2.12-ci-gateway"
              current-parameters: true

              predefined-parameters: |-
                TEST_GROUPS=tftf-l2-fvp-auxiliary-lts-v2.12 tftf-l2-juno-lts-v2.12 tf-l2-boot-tests-spm-mm-lts-v2.12 tftf-l2-fvp-dynamiq-lts-v2.12 spm-l2-boot-tests-lts-v2.12

      - multijob:
          condition: "COMPLETED"
          name: "Run extensive TF-A-Tests"

          projects:
            - kill-phase-on: "NEVER"
              name: "tf-a-lts2.12-ci-gateway"
              current-parameters: true

              predefined-parameters: |-
                TEST_GROUPS=tftf-l2-extensive-tests-fvp-lts-v2.12

    triggers:
      - gerrit:
          server-name: "review.trustedfirmware.org"

          projects:
            - branches:
                - branch-compare-type: "PLAIN"
                  branch-pattern: "lts-v2.12"

              project-compare-type: "PLAIN"
              project-pattern: "{gerrit_project_prefix}TF-A/tf-a-tests"

          trigger-on:
            - comment-added-event:
                approval-category: "Allow-CI"
                approval-value: 2

          override-votes: true
          gerrit-build-started-verified-value: 0
          gerrit-build-successful-verified-value: 1
          gerrit-build-failed-verified-value: -1
          gerrit-build-unstable-verified-value: -1
          gerrit-build-notbuilt-verified-value: 0
          gerrit-build-started-codereview-value: 0
          gerrit-build-successful-codereview-value: 0
          gerrit-build-failed-codereview-value: 0
          gerrit-build-unstable-codereview-value: 0
          gerrit-build-notbuilt-codereview-value: 0
