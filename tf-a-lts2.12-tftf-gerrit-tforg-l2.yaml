- job:
    name: "tf-a-lts2.12-tftf-gerrit-tforg-l2"
    node: "docker-amd64-tf-a-lts2.12-jammy"
    project-type: "multijob"
    concurrent: true
    disabled: false

    description: |
      Job that triggers for every TF-A-Tests patch approved with the Allow-CI+2
      label on review.trustedfirmware.org.

    properties:
      - "tf-a-clone-properties"

      - tf-a-ci-scripts:
          download_server_url: "https://downloads.trustedfirmware.org"
          download_server_tf_a_url: "https://downloads.trustedfirmware.org/tf-a-lts-v2.12"

      - build-discarder:
          days-to-keep: 30

    parameters:
      - tf-a-builder-parameters:
          default_gerrit_project: "{gerrit_project_prefix}TF-A/tf-a-tests"
          default_gerrit_branch: "lts-v2.12"

          default_tf_a_project: "{gerrit_project_prefix}TF-A/trusted-firmware-a"
          default_tf_a_branch: "lts-v2.12"
          default_tf_a_mbedtls_version: "3.6.3"

          default_rf_a_project: "{gerrit_project_prefix}RF-A/rusted-firmware-a"
          default_rf_a_branch: "main"

          default_tftf_project: "${{GERRIT_PROJECT}}"
          default_tftf_branch: "${{GERRIT_REFSPEC}}"

          default_tf_m_tests_project: "{gerrit_project_prefix}TF-M/tf-m-tests"
          default_tf_m_tests_branch: "53ddc58dcd57e1f5cf658b316d7d735335d58570"

          default_tf_m_extras_project: "{gerrit_project_prefix}TF-M/tf-m-extras"
          default_tf_m_extras_branch: "3ff04e40ff7f66c8cee087b6e5cbd8fb8c1bec01"

          default_hafnium_project: "{gerrit_project_prefix}hafnium/hafnium"
          default_hafnium_branch: "v2.12"

          default_tf_rmm_project: "{gerrit_project_prefix}TF-RMM/tf-rmm"
          default_tf_rmm_branch: "main"

          default_tfut_project: "{gerrit_project_prefix}TF-A/tf-a-unit-tests"
          default_tfut_branch: "main"

          default_tf_a_ci_scripts_project: "{gerrit_project_prefix}ci/tf-a-ci-scripts"
          default_tf_a_ci_scripts_branch: "master"

          default_tf_a_ci_jobs_project: "{gerrit_project_prefix}ci/tf-a-job-configs.git"
          default_tf_a_ci_jobs_branch: "master"

      - string:
          name: "GERRIT_PATCHSET_NUMBER"
          default: ""

      - string:
          name: "GERRIT_CHANGE_NUMBER"
          default: ""

      - string:
          name: "TF_GERRIT_BRANCH"
          default: "lts-v2.12"
          description: "Git project branch for Trusted Firmware-A."

    wrappers:
      - credentials-binding:
          - ssh-user-private-key:
              credential-id: "TFA_CI_BOT_USER_SSH_KEY"
              key-file-variable: "CI_BOT_KEY"
              username-variable: "CI_BOT_USERNAME"
              passphrase-variable: ""

      - "timestamps"

    builders:
      - multijob:
          condition: "COMPLETED"
          name: "Carry out level 1 tests"

          projects:
            - kill-phase-on: "NEVER"
              name: "tf-a-lts2.12-tftf-gerrit-tforg-l1"
              current-parameters: true

      - multijob:
          condition: "COMPLETED"
          name: "Run Firmware Update Tests"

          projects:
            - kill-phase-on: "NEVER"
              name: "tf-a-lts2.12-ci-gateway"
              current-parameters: true

              predefined-parameters: |-
                TEST_GROUPS=tftf-l2-fwu-lts-v2.12

      - multijob:
          condition: "COMPLETED"
          name: "Run Level 2 testing of TF-A-Tests"

          projects:
            - kill-phase-on: "NEVER"
              name: "tf-a-lts2.12-ci-gateway"
              current-parameters: true

              predefined-parameters: |-
                TEST_GROUPS=tftf-l2-fvp-auxiliary-lts-v2.12 tftf-l2-juno-lts-v2.12 tf-l2-boot-tests-spm-mm-lts-v2.12 tftf-l2-fvp-dynamiq-lts-v2.12 spm-l2-boot-tests-lts-v2.12

      - multijob:
          condition: "COMPLETED"
          name: "Run extensive TF-A-Tests"

          projects:
            - kill-phase-on: "NEVER"
              name: "tf-a-lts2.12-ci-gateway"
              current-parameters: true

              predefined-parameters: |-
                TEST_GROUPS=tftf-l2-extensive-tests-fvp-lts-v2.12

    triggers:
      - gerrit:
          server-name: "review.trustedfirmware.org"

          projects:
            - branches:
                - branch-compare-type: "PLAIN"
                  branch-pattern: "lts-v2.12"

              project-compare-type: "PLAIN"
              project-pattern: "{gerrit_project_prefix}TF-A/tf-a-tests"

          trigger-on:
            - comment-added-event:
                approval-category: "Allow-CI"
                approval-value: 2

          override-votes: true
          gerrit-build-started-verified-value: 0
          gerrit-build-successful-verified-value: 1
          gerrit-build-failed-verified-value: -1
          gerrit-build-unstable-verified-value: -1
          gerrit-build-notbuilt-verified-value: 0
          gerrit-build-started-codereview-value: 0
          gerrit-build-successful-codereview-value: 0
          gerrit-build-failed-codereview-value: 0
          gerrit-build-unstable-codereview-value: 0
          gerrit-build-notbuilt-codereview-value: 0
