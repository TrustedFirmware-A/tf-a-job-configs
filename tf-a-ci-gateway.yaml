- job-template:
    id: "tf-a-ci-gateway"
    project-type: "freestyle"

    name: "{base}-ci-gateway"
    node: "{node}"

    description: >
      Run one or more <strong>{label}</strong> test configurations.

    concurrent: true
    disabled: false

    properties:
      - tf-a-ci-scripts:
          download_server_url: "https://downloads.trustedfirmware.org"
          download_server_tf_a_url: "https://downloads.trustedfirmware.org/{downloads_space}"

      - build-discarder:
          days-to-keep: 30

    parameters:
      - tf-a-clone-parameters:
          projects: "{default_clones}"

      - string:
          name: "TEST_GROUPS"
          default: "{default_groups}"

          description: >
            Whitespace-separated list of test configurations and/or pre-defined
            test groups to run, e.g.:

            <ul>
              <li><code>tf-a-l1-build-arm-fvp</code></li>
              <li><code>tf-a-l1-build-arm-fvp tf-a-l2-functional-tftf-arm-fvp</code></li>
              <li><code>tf-a-l1-build-arm-fvp tf-a-l2-functional-tftf-arm-fvp/fvp-default,fvp-default:fvp-tftf-fip.tftf-aemva-debug</code></li>
              <li><code>tf-a-l1-build-arm-fvp/fvp-default:nil tf-a-l2-functional-tftf-arm-fvp/fvp-default,fvp-default:fvp-tftf-fip.tftf-aemva-debug</code></li>
            </ul>

      - tf-a-gerrit-change-based-patchset-parameters:
          gerrit_project: "{gerrit_project}"
          gerrit_branch: "{gerrit_branch}"
          gerrit_refspec: "{gerrit_branch}"

      - tf-a-builder-parameters:
          tf_a_project: "{tf_a_project}"
          tf_a_branch: "{tf_a_branch}"

          rf_a_project: "{rf_a_project}"
          rf_a_branch: "{rf_a_branch}"

          tftf_project: "{tftf_project}"
          tftf_branch: "{tftf_branch}"

          tf_m_tests_project: "{tf_m_tests_project}"
          tf_m_tests_branch: "{tf_m_tests_branch}"

          tf_m_extras_project: "{tf_m_extras_project}"
          tf_m_extras_branch: "{tf_m_extras_branch}"

          hafnium_project: "{hafnium_project}"
          hafnium_branch: "{hafnium_branch}"

          tf_rmm_project: "{tf_rmm_project}"
          tf_rmm_branch: "{tf_rmm_branch}"

          tfut_project: "{tfut_project}"
          tfut_branch: "{tfut_branch}"

          tf_a_ci_scripts_project: "{tf_a_ci_scripts_project}"
          tf_a_ci_scripts_branch: "{tf_a_ci_scripts_branch}"
          tf_a_ci_scripts_mbed_tls_version: "{tf_a_ci_scripts_mbed_tls_version}"

          lava_priority: "medium"

    scm:
      - git:
          url: "ssh://review.trustedfirmware.org:29418/ci/tf-a-ci-scripts"
          credentials-id: "TFA_CI_BOT_USER_SSH_KEY"
          basedir: "tf-a-ci-scripts"

          refspec: "+${{CI_REFSPEC}}:refs/remotes/origin/${{CI_REFSPEC}}"
          branches: ["refs/remotes/origin/${{CI_REFSPEC}}"]

          changelog-against:
            branch: "master"

          extensions:
            - honor-refspec: true

    wrappers:
      - timeout:
          timeout: 240
          fail: true

      - "timestamps"

    builders:
      - shell: |
          #!/bin/bash
          set -e
          CI_ROOT=${{PWD}}/tf-a-ci-scripts
          export workspace=$PWD
          export test_groups=$TEST_GROUPS
          $CI_ROOT/script/gen_test_desc.py

      - trigger-builds:
          - project:
              - "{base}-builder"

            block: true
            current-parameters: true

            predefined-parameters: |
              CLONE_REPOS=${{CLONE_REPOS}}

            parameter-factories:
              - factory: "filebuild"
                file-pattern: "*.testprop"
                no-files-found-action: "FAIL"

    publishers:
      - postbuildscript:
          builders:
            - role: "SLAVE"

              build-on:
                - "SUCCESS"
                - "FAILURE"
                - "UNSTABLE"
                - "ABORTED"
                - "NOT_BUILT"

              build-steps:
                - shell: |-
                    #!/bin/bash -e
                    export CI_ROOT=${{PWD}}/tf-a-ci-scripts
                    bash "$CI_ROOT/job/tf-ci-gateway/generate_report.sh"

      - archive:
          artifacts: "report.json, report.html, merge/outdir/**"

      - groovy-postbuild:
          on-failure: "failed"
          sandbox: true

          script: !include-raw-verbatim:
            - "tf-a-ci-gateway/postbuild.groovy"
