- job-template:
    id: "tf-a-ci-gateway"
    project-type: "freestyle"

    name: "{base}-ci-gateway"
    node: "{node}"

    description: >
      Run one or more <strong>{label}</strong> test configurations.

    concurrent: true
    disabled: false

    properties:
      - tf-a-ci-scripts:
          download_server_url: "https://downloads.trustedfirmware.org"
          download_server_tf_a_url: "https://downloads.trustedfirmware.org/{downloads_space}"

      - build-discarder:
          days-to-keep: 30

    parameters:
      - tf-a-clone-parameters:
          projects: "{default_clones}"

      - string:
          name: "TEST_GROUPS"
          default: "{default_groups}"

          description: |
            White space separated list of test configs: can be mix of specific
            test configs (e.g., <code>l1/fvp-default:fvp-linux-default</code>) and
            group names (e.g., <code>l1 l2</code>).

      - tf-a-builder-parameters:
          default_config: "{default_config}"
          default_config_desc: "{default_config_desc}"
          default_clones: "{default_clones}"

          default_gerrit_project: "{default_gerrit_project}"
          default_gerrit_branch: "{default_gerrit_branch}"

          default_tf_a_project: "{default_tf_a_project}"
          default_tf_a_branch: "{default_tf_a_branch}"
          default_tf_a_mbedtls_version: "{default_tf_a_mbedtls_version}"

          default_rf_a_project: "{default_rf_a_project}"
          default_rf_a_branch: "{default_rf_a_branch}"

          default_tftf_project: "{default_tftf_project}"
          default_tftf_branch: "{default_tftf_branch}"

          default_tf_m_tests_project: "{default_tf_m_tests_project}"
          default_tf_m_tests_branch: "{default_tf_m_tests_branch}"

          default_tf_m_extras_project: "{default_tf_m_extras_project}"
          default_tf_m_extras_branch: "{default_tf_m_extras_branch}"

          default_hafnium_project: "{default_hafnium_project}"
          default_hafnium_branch: "{default_hafnium_branch}"

          default_tf_rmm_project: "{default_tf_rmm_project}"
          default_tf_rmm_branch: "{default_tf_rmm_branch}"

          default_tfut_project: "{default_tfut_project}"
          default_tfut_branch: "{default_tfut_branch}"

          default_tf_a_ci_scripts_project: "{default_tf_a_ci_scripts_project}"
          default_tf_a_ci_scripts_branch: "{default_tf_a_ci_scripts_branch}"

          default_tf_a_ci_jobs_project: "{default_tf_a_ci_jobs_project}"
          default_tf_a_ci_jobs_branch: "{default_tf_a_ci_jobs_branch}"

    scm:
      - git:
          url: "ssh://review.trustedfirmware.org:29418/ci/tf-a-ci-scripts"
          credentials-id: "TFA_CI_BOT_USER_SSH_KEY"
          basedir: "tf-a-ci-scripts"

          refspec: "+${{CI_REFSPEC}}:refs/remotes/origin/${{CI_REFSPEC}}"
          branches: ["refs/remotes/origin/${{CI_REFSPEC}}"]

          changelog-against:
            branch: "master"

          extensions:
            - honor-refspec: true

    wrappers:
      - timeout:
          timeout: 240
          fail: true

      - "timestamps"

    builders:
      - shell: |
          #!/bin/bash
          set -e
          CI_ROOT=${{PWD}}/tf-a-ci-scripts
          export workspace=$PWD
          export test_groups=$TEST_GROUPS
          $CI_ROOT/script/gen_test_desc.py

      - trigger-builds:
          - project:
              - "{base}-builder"

            block: true
            current-parameters: true

            predefined-parameters: |
              CLONE_REPOS=${{CLONE_REPOS}}

            parameter-factories:
              - factory: "filebuild"
                file-pattern: "*.testprop"
                no-files-found-action: "FAIL"

    publishers:
      - postbuildscript:
          builders:
            - role: "SLAVE"

              build-on:
                - "SUCCESS"
                - "FAILURE"
                - "UNSTABLE"
                - "ABORTED"
                - "NOT_BUILT"

              build-steps:
                - shell: |-
                    #!/bin/bash -e
                    export CI_ROOT=${{PWD}}/tf-a-ci-scripts
                    bash "$CI_ROOT/job/tf-ci-gateway/generate_report.sh"

      - archive:
          artifacts: "report.json, report.html, merge/outdir/**"

      - groovy-postbuild:
          script: !include-raw-verbatim:
            - "tf-a-ci-gateway/postbuild.groovy"
