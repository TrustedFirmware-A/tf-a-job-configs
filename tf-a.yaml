          default_tftf_project: "TF-A/tf-a-tests"
          default_tftf_branch: "lts-v2.8"

          default_tf_m_tests_project: "TF-M/tf-m-tests"
          default_tf_m_tests_branch: "master"

          default_tf_m_extras_project: "TF-M/tf-m-extras"
          default_tf_m_extras_branch: "master"

          default_hafnium_project: "hafnium/hafnium"
          default_hafnium_branch: "v2.8"

