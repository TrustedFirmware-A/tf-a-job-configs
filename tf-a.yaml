          node: "docker-amd64-tf-a-lts2.14-jammy"
          downloads_space: "tf-a-lts-v2.14"

          armclang_version: "6.23"
          armclang_warehouse_version: "6.23/37"

          default_config: "fvp-default-lts-v2.14:nil"
          default_config_desc: "0000%tf-l1-build-fvp-lts-v2.14%fvp-default-lts-v2.14,nil,nil,nil,nil,nil:nil.test"

          default_gerrit_project: "TF-A/trusted-firmware-a"
          default_gerrit_branch: "lts-v2.14"

          default_tf_a_mbedtls_version: "3.6.5"

          default_tftf_project: "TF-A/tf-a-tests"
          default_tftf_branch: "lts-v2.14"

          default_tf_m_tests_project: "TF-M/tf-m-tests"
          default_tf_m_tests_branch: "3041b858639c85d9541c37fcbd1b42d3d0f03c79"

          default_tf_m_extras_project: "TF-M/tf-m-extras"
          default_tf_m_extras_branch: "6edb83b21cae8ebbc3c3c219ea34d41ca0cc2bf1"

          default_hafnium_project: "hafnium/hafnium"
          default_hafnium_branch: "lts-v2.14"

          default_tf_rmm_project: "TF-RMM/tf-rmm"
          default_tf_rmm_branch: "tf-rmm-v0.8.0"

          default_tfut_project: "TF-A/tf-a-unit-tests"
          default_tfut_branch: "tfaut-v0.1"

    views:
      - tf-a-view:
          name: "TF-A"
          description: "Trusted Firmware-A"
          regex: "^tf-a(-.*)?$"

      - tf-a-view:
          name: "TF-A-LTS"
          description: "Trusted Firmware-A LTS"
          regex: "^tf-a-lts.*$"

      - tf-a-view:
          name: "TF-A-LTS2.8"
          description: "Trusted Firmware-A LTS v2.8"
          regex: "^tf-a-lts2[.]8(-.*)?$"

      - tf-a-view:
          name: "TF-A-LTS2.10"
          description: "Trusted Firmware-A LTS v2.10"
          regex: "^tf-a-lts2[.]10(-.*)?$"

      - tf-a-view:
          name: "TF-A-LTS2.12"
          description: "Trusted Firmware-A LTS v2.12"
          regex: "^tf-a-lts2[.]12(-.*)?$"

      - tf-a-view:
          name: "TF-A-LTS2.14"
          description: "Trusted Firmware-A LTS v2.14"
          regex: "^tf-a-lts2[.]14(-.*)?$"

    jobs:
      - tf-a-gateway-chain:
          default_clones: "trusted-firmware-a,tf-a-ci-scripts,tf-a-tests,tf-m-extras,tf-m-tests,tf-rmm,spm"

          default_tf_a_project: "${{GERRIT_PROJECT}}"
          default_tf_a_branch: "${{GERRIT_REFSPEC}}"

          default_rf_a_project: "RF-A/rusted-firmware-a"
          default_rf_a_branch: "main"

          default_tf_a_ci_scripts_project: "ci/tf-a-ci-scripts"
          default_tf_a_ci_scripts_branch: "master"

          default_tf_a_ci_jobs_project: "ci/tf-a-job-configs"
          default_tf_a_ci_jobs_branch: "master"

- builder:
    name: "tf-a-clone"

    builders:
      - inject:
          properties-content: |
            CLONE_REPOS={projects}

      - shell: !include-raw-verbatim: "scripts/clone.sh"

- parameter:
    name: "tf-a-clone-parameters"

    parameters:
      - string:
          name: "CLONE_REPOS"
          default: "{projects}"

- property:
    name: "tf-a-clone-properties"

    properties:
      - inject:
          script-content: !include-raw-verbatim: "scripts/clone-properties.sh"
          override-build-parameters: true

- property:
    name: "tf-a-ci-scripts"

    properties:
      - inject:
          properties-content: |
            DOWNLOAD_SERVER_URL={download_server_url}
            DOWNLOAD_SERVER_TF_A_URL={download_server_tf_a_url}
