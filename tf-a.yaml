      - "tf-a-lts2.12":
          label: "TF-A LTS v2.12"

          node: "docker-amd64-tf-a-lts2.12-jammy"
          downloads_space: "tf-a-lts-v2.12"

          armclang_version: "6.18"
          armclang_warehouse_version: "6.18/19"

          default_config: "fvp-default-lts-v2.12:nil"
          default_config_desc: "0000%tf-l1-build-fvp-lts-v2.12%fvp-default-lts-v2.12,nil,nil,nil,nil,nil:nil.test"

          default_gerrit_project: "TF-A/trusted-firmware-a"
          default_gerrit_branch: "lts-v2.12"

