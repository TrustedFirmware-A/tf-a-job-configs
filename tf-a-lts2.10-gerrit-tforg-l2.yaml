- job:
    name: "tf-a-lts2.10-gerrit-tforg-l2"
    node: "docker-amd64-tf-a-lts2.10-jammy"
    project-type: "multijob"
    concurrent: true
    disabled: false

    description: |
      Job that triggers for every TF-A patch approved with the Allow-CI+2
      label on review.trustedfirmware.org.

    properties:
      - "tf-a-clone-properties"

      - tf-a-ci-scripts:
          download_server_url: "https://downloads.trustedfirmware.org"
          download_server_tf_a_url: "https://downloads.trustedfirmware.org/tf-a-lts-v2.10"

      - build-discarder:
          days-to-keep: 30

    parameters:
      - tf-a-builder-parameters:
          tf_a_project: "${{GERRIT_PROJECT}}"
          tf_a_branch: "${{GERRIT_REFSPEC}}"

          tftf_project: "{gerrit_project_prefix}TF-A/tf-a-tests"
          tftf_branch: "lts-v2.10"

          tf_a_ci_scripts_mbed_tls_version: "3.6.4"

      - tf-a-gerrit-comment-added-parameters:
          gerrit_project: "{gerrit_project_prefix}TF-A/trusted-firmware-a"
          gerrit_branch: "lts-v2.10"
          gerrit_refspec: "lts-v2.10"

      - string:
          name: "TFTF_GERRIT_BRANCH"
          default: "lts-v2.10"

    wrappers:
      - credentials-binding:
          - ssh-user-private-key:
              credential-id: "TFA_CI_BOT_USER_SSH_KEY"
              key-file-variable: "CI_BOT_KEY"
              username-variable: "CI_BOT_USERNAME"
              passphrase-variable: ""

      - "timestamps"

    builders:
      - multijob:
          condition: "COMPLETED"
          name: "Carry out level 1 tests"

          projects:
            - kill-phase-on: "NEVER"
              name: "tf-a-lts2.10-gerrit-tforg-l1"
              current-parameters: true

      - multijob:
          condition: "COMPLETED"
          name: "Build Trusted Firmware"

          projects:
            - kill-phase-on: "NEVER"
              name: "tf-a-lts2.10-ci-gateway"
              current-parameters: true

              predefined-parameters: |
                TEST_GROUPS=tf-l2-build-fvp-lts-v2.10 tf-l2-build-juno-lts-v2.10

      - multijob:
          condition: "COMPLETED"
          name: "Run platform boot tests"

          projects:
            - kill-phase-on: "NEVER"
              name: "tf-a-lts2.10-ci-gateway"
              current-parameters: true

              predefined-parameters: |
                TEST_GROUPS=tf-l2-boot-tests-arm-plats-lts-v2.10 tf-l2-boot-tests-partner-boards-lts-v2.10

      - multijob:
          condition: "COMPLETED"
          name: "TFTF tests"

          projects:
            - kill-phase-on: "NEVER"
              name: "tf-a-lts2.10-ci-gateway"
              current-parameters: true

              predefined-parameters: |
                TEST_GROUPS=tftf-l1-fvp-lts-v2.10 tftf-l1-juno-lts-v2.10 tftf-l2-fvp-auxiliary-lts-v2.10 tftf-l2-fvp-dynamiq-lts-v2.10 tftf-l2-fwu-lts-v2.10 tftf-l2-fvp-lts-v2.10

      - multijob:
          condition: "COMPLETED"
          name: "Boot up to the Linux shell prompt"

          projects:
            - kill-phase-on: "NEVER"
              name: "tf-a-lts2.10-ci-gateway"
              current-parameters: true

              predefined-parameters: |
                TEST_GROUPS=tf-l2-boot-tests-aarch32-lts-v2.10 tf-l2-boot-tests-bl2_el3-lts-v2.10 tf-l2-boot-tests-cortex-lts-v2.10 tf-l2-boot-tests-juno-lts-v2.10 tf-l2-boot-tests-latest-lts-v2.10 tf-l2-boot-tests-misc-lts-v2.10 tf-l2-boot-tests-rootfs-lts-v2.10 tf-l2-boot-tests-spm-mm-lts-v2.10 spm-l2-boot-tests-lts-v2.10

      - conditional-step:
          condition-command: '[ "$NOMINATION_FILE" ]'
          condition-kind: "shell"
          on-evaluation-failure: "dont-run"

          steps:
            - multijob:
                condition: "COMPLETED"
                name: "Nominated tests"

                projects:
                  - kill-phase-on: "NEVER"
                    name: "tf-a-lts2.10-ci-gateway"
                    current-parameters: true

                    predefined-parameters: |
                      TEST_GROUPS=@$NOMINATION_FILE

    triggers:
      - gerrit:
          server-name: "review.trustedfirmware.org"

          trigger-on:
            - comment-added-event:
                approval-category: "Allow-CI"
                approval-value: 2

          projects:
            - project-compare-type: "PLAIN"
              project-pattern: "{gerrit_project_prefix}TF-A/trusted-firmware-a"

              branches:
                - branch-compare-type: "PLAIN"
                  branch-pattern: "lts-v2.10"

          override-votes: true
          gerrit-build-started-verified-value: 0
          gerrit-build-successful-verified-value: 1
          gerrit-build-failed-verified-value: -1
          gerrit-build-unstable-verified-value: -1
          gerrit-build-notbuilt-verified-value: 0
          gerrit-build-started-codereview-value: 0
          gerrit-build-successful-codereview-value: 0
          gerrit-build-failed-codereview-value: 0
          gerrit-build-unstable-codereview-value: 0
          gerrit-build-notbuilt-codereview-value: 0
          failure-message: "OpenCI: build failed"
          successful-message: "OpenCI: build successful"
          unstable-message: "OpenCI: build unstable"
          notbuilt-message: "OpenCI: no builds executed"
          silent: false
          silent-start: false
