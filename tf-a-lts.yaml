- project:
    name: "tf-a-lts"

    base:
      - "tf-a-lts2.8":
          version: "2.8"

          armclang_version: "6.18"
          armclang_warehouse_version: "6.18/19"

          default_tf_a_mbedtls_version: "3.6.4"

          default_tf_m_tests_project: "TF-M/tf-m-tests"
          default_tf_m_tests_branch: "master"

          default_tf_m_extras_project: "TF-M/tf-m-extras"
          default_tf_m_extras_branch: "master"

          default_hafnium_project: "hafnium/hafnium"
          default_hafnium_branch: "v2.8"

          default_tf_rmm_project: "TF-RMM/tf-rmm"
          default_tf_rmm_branch: "main"

          default_tfut_project: "TF-A/tf-a-unit-tests"
          default_tfut_branch: "main"

      - "tf-a-lts2.10":
          version: "2.10"

          armclang_version: "6.18"
          armclang_warehouse_version: "6.18/19"

          default_tf_a_mbedtls_version: "3.6.4"

          default_tf_m_tests_project: "TF-M/tf-m-tests"
          default_tf_m_tests_branch: "95d3407a65e26fb3a4319ab38c257e50c9ee804f"

          default_tf_m_extras_project: "TF-M/tf-m-extras"
          default_tf_m_extras_branch: "master"

          default_hafnium_project: "hafnium/hafnium"
          default_hafnium_branch: "v2.10"

          default_tf_rmm_project: "TF-RMM/tf-rmm"
          default_tf_rmm_branch: "main"

          default_tfut_project: "TF-A/tf-a-unit-tests"
          default_tfut_branch: "main"

      - "tf-a-lts2.12":
          version: "2.12"

          armclang_version: "6.18"
          armclang_warehouse_version: "6.18/19"

          default_tf_a_mbedtls_version: "3.6.3"

          default_tf_m_tests_project: "TF-M/tf-m-tests"
          default_tf_m_tests_branch: "53ddc58dcd57e1f5cf658b316d7d735335d58570"

          default_tf_m_extras_project: "TF-M/tf-m-extras"
          default_tf_m_extras_branch: "3ff04e40ff7f66c8cee087b6e5cbd8fb8c1bec01"

          default_hafnium_project: "hafnium/hafnium"
          default_hafnium_branch: "v2.12"

          default_tf_rmm_project: "TF-RMM/tf-rmm"
          default_tf_rmm_branch: "main"

          default_tfut_project: "TF-A/tf-a-unit-tests"
          default_tfut_branch: "main"

      - "tf-a-lts2.14":
          version: "2.14"

          armclang_version: "6.23"
          armclang_warehouse_version: "6.23/37"

          default_tf_a_mbedtls_version: "3.6.5"

          default_tf_m_tests_project: "TF-M/tf-m-tests"
          default_tf_m_tests_branch: "3041b858639c85d9541c37fcbd1b42d3d0f03c79"

          default_tf_m_extras_project: "TF-M/tf-m-extras"
          default_tf_m_extras_branch: "6edb83b21cae8ebbc3c3c219ea34d41ca0cc2bf1"

          default_hafnium_project: "hafnium/hafnium"
          default_hafnium_branch: "lts-v2.14"

          default_tf_rmm_project: "TF-RMM/tf-rmm"
          default_tf_rmm_branch: "tf-rmm-v0.8.0"

          default_tfut_project: "TF-A/tf-a-unit-tests"
          default_tfut_branch: "tfaut-v0.1"

    views:
      - tf-a-view:
          name: "TF-A-LTS"
          description: "Trusted Firmware-A LTS"
          regex: "^tf-a-lts.*$"

      - tf-a-view:
          name: "TF-A-LTS2.8"
          description: "Trusted Firmware-A LTS v2.8"
          regex: "^tf-a-lts2[.]8(-.*)?$"

      - tf-a-view:
          name: "TF-A-LTS2.10"
          description: "Trusted Firmware-A LTS v2.10"
          regex: "^tf-a-lts2[.]10(-.*)?$"

      - tf-a-view:
          name: "TF-A-LTS2.12"
          description: "Trusted Firmware-A LTS v2.12"
          regex: "^tf-a-lts2[.]12(-.*)?$"

      - tf-a-view:
          name: "TF-A-LTS2.14"
          description: "Trusted Firmware-A LTS v2.14"
          regex: "^tf-a-lts2[.]14(-.*)?$"

    jobs:
      - tf-a-builder:
          node: "docker-amd64-tf-a-lts{version}-jammy"

          label: "TF-A LTS v{version}"

          downloads_space: "tf-a-lts-v{version}"
          default_clones: "trusted-firmware-a,tf-a-ci-scripts,tf-a-tests,tf-m-extras,tf-m-tests,tf-rmm,spm"

          default_config: "tf-l1-build-fvp/fvp-default:nil"
          default_config_desc: "0000%tf-l1-build-fvp%fvp-default,nil,nil,nil:nil.test"

          default_gerrit_project: "TF-A/trusted-firmware-a"
          default_gerrit_branch: "lts-v{version}"

          default_tf_a_project: "${{GERRIT_PROJECT}}"
          default_tf_a_branch: "${{GERRIT_REFSPEC}}"

          default_rf_a_project: "RF-A/rusted-firmware-a"
          default_rf_a_branch: "main"

          default_tftf_project: "TF-A/tf-a-tests"
          default_tftf_branch: "lts-v{version}"

          default_tf_a_ci_scripts_project: "ci/tf-a-ci-scripts"
          default_tf_a_ci_scripts_branch: "lts-v{version}"

          default_tf_a_ci_jobs_project: "ci/tf-a-job-configs"
          default_tf_a_ci_jobs_branch: "master"
