- job-template:
    id: "tf-a-main"
    project-type: "multijob"

    name: "{base}-main"
    node: "{node}"

    description: |
      Run all <strong>{label}</strong> validation.

    concurrent: true
    disabled: false

    properties:
      - tf-a-ci-scripts:
          download_server_url: "https://downloads.trustedfirmware.org"
          download_server_tf_a_url: "https://downloads.trustedfirmware.org/{downloads_space}"

      - build-discarder:
          days-to-keep: 30

    parameters:
      - tf-a-gerrit-change-based-patchset-parameters:
          gerrit_project: "TF-A/trusted-firmware-a"
          gerrit_branch: "{gerrit_branch}"
          gerrit_refspec: "{gerrit_refspec}"

      - tf-a-builder-parameters:
          tf_a_project: "${{GERRIT_PROJECT}}"
          tf_a_branch: "${{GERRIT_REFSPEC}}"

          rf_a_project: "{rf_a_project}"
          rf_a_branch: "{rf_a_branch}"

          tftf_project: "{tftf_project}"
          tftf_branch: "{tftf_branch}"

          tf_m_tests_project: "{tf_m_tests_project}"
          tf_m_tests_branch: "{tf_m_tests_branch}"

          tf_m_extras_project: "{tf_m_extras_project}"
          tf_m_extras_branch: "{tf_m_extras_branch}"

          hafnium_project: "{hafnium_project}"
          hafnium_branch: "{hafnium_branch}"

          tf_rmm_project: "{tf_rmm_project}"
          tf_rmm_branch: "{tf_rmm_branch}"

          tfut_project: "{tfut_project}"
          tfut_branch: "{tfut_branch}"

          tf_a_ci_scripts_project: "{tf_a_ci_scripts_project}"
          tf_a_ci_scripts_branch: "{tf_a_ci_scripts_branch}"
          tf_a_ci_scripts_mbed_tls_version: "{tf_a_ci_scripts_mbed_tls_version}"

          lava_priority: "medium"

    wrappers:
      - timestamps:

    builders:
      - multijob:
          name: "Run static checks on the code"
          condition: "COMPLETED"

          projects:
            - name: "tf-a-static-checks"
              current-parameters: true
              kill-phase-on: "NEVER"

      - multijob:
          name: "Build Trusted Firmware"
          condition: "COMPLETED"

          projects:
            - name: "{base}-ci-gateway"
              alias: "tf-l1-build-fvp tf-l2-build-fvp"
              current-parameters: true
              kill-phase-on: "NEVER"

              predefined-parameters: |
                TEST_GROUPS=tf-l1-build-fvp{tf_a_ci_scripts_test_suffix} tf-l2-build-fvp{tf_a_ci_scripts_test_suffix}

            - name: "{base}-ci-gateway"
              alias: "tf-l1-build-juno tf-l2-build-juno"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-l1-build-juno{tf_a_ci_scripts_test_suffix} tf-l2-build-juno{tf_a_ci_scripts_test_suffix}"

            - name: "{base}-ci-gateway"
              alias: "tf-l1-build-plat"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-l1-build-plat{tf_a_ci_scripts_test_suffix}"

            - name: "{base}-ci-gateway"
              alias: "tf-l1-build-clang"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-l1-build-clang{tf_a_ci_scripts_test_suffix}"

      - multijob:
          name: "Build Trusted Firmware Test Framework"
          condition: "COMPLETED"

          projects:
            - current-parameters: true
              kill-phase-on: "NEVER"
              name: "{base}-ci-gateway"
              alias: "tftf-l1-build"
              predefined-parameters: "TEST_GROUPS=tftf-l1-build{tf_a_ci_scripts_test_suffix}"

      - multijob:
          name: "TFTF Tests for FVP"
          condition: "COMPLETED"

          projects:
            - name: "{base}-ci-gateway"
              alias: "tftf-l2-fwu"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tftf-l2-fwu{tf_a_ci_scripts_test_suffix}"

            - name: "{base}-ci-gateway"
              alias: "tftf-l1-fvp tftf-l2-fvp-auxiliary"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tftf-l1-fvp{tf_a_ci_scripts_test_suffix} tftf-l2-fvp-auxiliary{tf_a_ci_scripts_test_suffix}"

            - name: "{base}-ci-gateway"
              alias: "tftf-l2-fvp tftf-l2-fvp-dynamiq"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tftf-l2-fvp{tf_a_ci_scripts_test_suffix} tftf-l2-fvp-dynamiq{tf_a_ci_scripts_test_suffix}"

            - name: "{base}-ci-gateway"
              alias: "tftf-l2-extensive-tests-fvp"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tftf-l2-extensive-tests-fvp{tf_a_ci_scripts_test_suffix}"

      - multijob:
          name: "Boot up to the Linux shell prompt"
          condition: "COMPLETED"

          projects:
            - name: "{base}-ci-gateway"
              alias: "tf-l2-boot-tests-aarch32"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-l2-boot-tests-aarch32{tf_a_ci_scripts_test_suffix}"

            - name: "{base}-ci-gateway"
              alias: "tf-l2-boot-tests-rootfs"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-l2-boot-tests-rootfs{tf_a_ci_scripts_test_suffix}"

            - name: "{base}-ci-gateway"
              alias: "tf-l2-boot-tests-spm-mm"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-l2-boot-tests-spm-mm{tf_a_ci_scripts_test_suffix}"

            - name: "{base}-ci-gateway"
              alias: "spm-l2-boot-tests"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=spm-l2-boot-tests{tf_a_ci_scripts_test_suffix}"

      - multijob:
          name: "Boot up to the Linux shell prompt - Part 2"
          condition: "COMPLETED"

          projects:
            - name: "{base}-ci-gateway"
              alias: "tf-l2-boot-tests-misc"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-l2-boot-tests-misc{tf_a_ci_scripts_test_suffix}"

            - name: "{base}-ci-gateway"
              alias: "tf-l2-boot-tests-latest"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-l2-boot-tests-latest{tf_a_ci_scripts_test_suffix}"

            - name: "{base}-ci-gateway"
              alias: "tf-l2-boot-tests-cortex"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-l2-boot-tests-cortex{tf_a_ci_scripts_test_suffix}"

            - name: "{base}-ci-gateway"
              alias: "tf-l2-boot-tests-gicv2"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-l2-boot-tests-gicv2{tf_a_ci_scripts_test_suffix}"

            - name: "{base}-ci-gateway"
              alias: "tf-l2-boot-tests-bl2_el3"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-l2-boot-tests-bl2_el3{tf_a_ci_scripts_test_suffix}"

            - name: "{base}-ci-gateway"
              alias: "qemu-boot-tests"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=qemu-boot-tests{tf_a_ci_scripts_test_suffix}"

            - name: "{base}-ci-gateway"
              alias: "rmm-l2-boot-tests"
              current-parameters: true
              kill-phase-on: "NEVER"
              enable-condition: "!('{gerrit_branch}' ==~ /^lts-v2[.](8|10|12)$/)"
              predefined-parameters: "TEST_GROUPS=rmm-l2-boot-tests{tf_a_ci_scripts_test_suffix}"

      - multijob:
          name: "Juno Boot Tests"
          condition: "COMPLETED"

          projects:
            - name: "{base}-ci-gateway"
              alias: "tf-l2-boot-tests-juno"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-l2-boot-tests-juno{tf_a_ci_scripts_test_suffix}"

            - name: "{base}-ci-gateway"
              alias: "tftf-l1-juno"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tftf-l1-juno{tf_a_ci_scripts_test_suffix}"

      - multijob:
          name: "Miscellaneous tests"
          condition: "COMPLETED"

          projects:
            - name: "{base}-ci-gateway"
              alias: "tf-l3-boot-tests-css"
              current-parameters: true
              kill-phase-on: "NEVER"
              enable-condition: "!('{gerrit_branch}' ==~ /^lts-v2[.](8|10)$/)"
              predefined-parameters: "TEST_GROUPS=tf-l3-boot-tests-css{tf_a_ci_scripts_test_suffix}"

            - name: "{base}-ci-gateway"
              alias: "tf-l3-boot-tests-spm-mm"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-l3-boot-tests-spm-mm{tf_a_ci_scripts_test_suffix}"

            - name: "{base}-ci-gateway"
              alias: "tf-l3-boot-tests-ras"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-l3-boot-tests-ras{tf_a_ci_scripts_test_suffix}"

            - name: "{base}-ci-gateway"
              alias: "tf-l3-boot-tests-misc"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-l3-boot-tests-misc{tf_a_ci_scripts_test_suffix}"

            - name: "{base}-ci-gateway"
              alias: "tf-l3-boot-tests-n1sdp"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-l3-boot-tests-n1sdp{tf_a_ci_scripts_test_suffix}"

            - name: "{base}-ci-gateway"
              alias: "spm-l3-boot-tests"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=spm-l3-boot-tests{tf_a_ci_scripts_test_suffix}"

            - name: "{base}-ci-gateway"
              alias: "tf-l2-boot-tests-partner-boards"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-l2-boot-tests-partner-boards{tf_a_ci_scripts_test_suffix}"

            # Platform-specific self-tests.
            # These tests run from the BL31 image then halt the target.
            - name: "{base}-ci-gateway"
              alias: "tf-l2-boot-tests-arm-plats"
              current-parameters: true
              kill-phase-on: "NEVER"
              enable-condition: "!('{gerrit_branch}' ==~ /^lts-v2[.](8|10)$/)"
              predefined-parameters: "TEST_GROUPS=tf-l2-boot-tests-arm-plats{tf_a_ci_scripts_test_suffix}"

      - multijob:
          name: "Run doc build check"
          condition: "COMPLETED"

          projects:
            - name: "{base}-ci-gateway"
              alias: "tf-l1-check-docs"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-l1-check-docs{tf_a_ci_scripts_test_suffix}"

      - multijob:
          name: "Generate visualizations"
          condition: "COMPLETED"

          projects:
            - name: "tf-a-sloc-visualization"
              current-parameters: true
              kill-phase-on: "NEVER"

            - name: "tf-a-test-category-visualization"
              current-parameters: true
              kill-phase-on: "NEVER"

            - name: "tf-a-test-result-visualization"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TARGET_BUILD=${{JOB_NAME}}/${{BUILD_NUMBER}}"
