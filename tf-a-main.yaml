- job-template:
    id: "tf-a-main"
    project-type: "multijob"

    name: "{base}-main"
    node: "{node}"

    description: |
      Run low- and medium-intensity <strong>{label}</strong> validation.

    concurrent: true
    disabled: false

    properties:
      - tf-a-ci-scripts:
          download_server_url: "https://downloads.trustedfirmware.org"
          download_server_tf_a_url: "https://downloads.trustedfirmware.org/{downloads_space}"

      - build-discarder:
          days-to-keep: 30

    parameters:
      - tf-a-gerrit-change-based-patchset-parameters:
          gerrit_project: "TF-A/trusted-firmware-a"
          gerrit_branch: "{gerrit_branch}"
          gerrit_refspec: "{gerrit_refspec}"

      - tf-a-builder-parameters:
          tf_a_project: "${{GERRIT_PROJECT}}"
          tf_a_branch: "${{GERRIT_REFSPEC}}"

          rf_a_project: "{rf_a_project}"
          rf_a_branch: "{rf_a_branch}"

          tftf_project: "{tftf_project}"
          tftf_branch: "{tftf_branch}"

          tf_m_tests_project: "{tf_m_tests_project}"
          tf_m_tests_branch: "{tf_m_tests_branch}"

          tf_m_extras_project: "{tf_m_extras_project}"
          tf_m_extras_branch: "{tf_m_extras_branch}"

          hafnium_project: "{hafnium_project}"
          hafnium_branch: "{hafnium_branch}"

          tf_rmm_project: "{tf_rmm_project}"
          tf_rmm_branch: "{tf_rmm_branch}"

          tfut_project: "{tfut_project}"
          tfut_branch: "{tfut_branch}"

          tf_a_ci_scripts_project: "{tf_a_ci_scripts_project}"
          tf_a_ci_scripts_branch: "{tf_a_ci_scripts_branch}"
          tf_a_ci_scripts_mbed_tls_version: "{tf_a_ci_scripts_mbed_tls_version}"

          lava_priority: "medium"

    wrappers:
      - timestamps:

    builders:
      - multijob:
          name: "Run static checks"
          condition: "COMPLETED"

          projects:
            - name: "{base}-static-checks"
              current-parameters: true
              kill-phase-on: "NEVER"

      - multijob:
          name: "Run documentation tests"
          condition: "COMPLETED"

          projects:
            - name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l1-docs-tests"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS={tf_a_ci_scripts_test_project}-l1-docs-tests"

      - multijob:
          name: "Run build tests"
          condition: "COMPLETED"

          projects:
            - name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l1-build-tests-clang"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS={tf_a_ci_scripts_test_project}-l1-build-tests-clang"

            - name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l1-build-tests-juno"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS={tf_a_ci_scripts_test_project}-l1-build-tests-juno"

            - name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l1-build-tests-base-fvp"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS={tf_a_ci_scripts_test_project}-l1-build-tests-base-fvp"

            - name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l1-build-tests-platforms"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS={tf_a_ci_scripts_test_project}-l1-build-tests-platforms"

      - multijob:
          name: "Run unit tests"
          condition: "COMPLETED"

          projects:
            - name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l1-unit-tests-tfut"
              current-parameters: true
              kill-phase-on: "NEVER"
              enable-condition: "'{gerrit_branch}' ==~ /^(master|lts-v2[.]14)$/"
              predefined-parameters: "TEST_GROUPS={tf_a_ci_scripts_test_project}-l1-unit-tests-tfut"

      - multijob:
          name: "Run functional tests"
          condition: "COMPLETED"

          projects:
            - name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-functional-tests-spm-base-fvp"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-functional-tests-spm-base-fvp"

            - name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-functional-tests-spm-mm-base-fvp"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-functional-tests-spm-mm-base-fvp"

            - name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-functional-tests-linux-uefi-base-fvp"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-functional-tests-linux-uefi-base-fvp"

            - name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-functional-tests-linux-aarch32-base-fvp"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-functional-tests-linux-aarch32-base-fvp"

            - name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-functional-tests-linux-base-fvp"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-functional-tests-linux-base-fvp"

            - name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-functional-tests-linux-qemu"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-functional-tests-linux-qemu"

            - name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-functional-tests-linux-juno"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-functional-tests-linux-juno"

            - name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-functional-tests-linux-n1sdp"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-functional-tests-linux-n1sdp"

            - name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-functional-tests-linux-lumex-1"
              current-parameters: true
              kill-phase-on: "NEVER"
              enable-condition: "!('{gerrit_branch}' ==~ /^lts-v2[.](8|10)$/)"
              predefined-parameters: "TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-functional-tests-linux-lumex-1"

            - name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-functional-tests-linux-reboot-juno"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-functional-tests-linux-reboot-juno"

            - name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-functional-tests-platforms"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-functional-tests-platforms"

      - multijob:
          name: "Run integration tests"
          condition: "COMPLETED"

          projects:
            - name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-fwu"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-fwu"

            - name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-spm-base-fvp"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-spm-base-fvp"

            - name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-spm-mm-base-fvp"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-spm-mm-base-fvp"

            - name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-rmm-base-fvp"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-rmm-base-fvp"

            - name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-dynamiq-base-fvp"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-dynamiq-base-fvp"

            - name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-juno"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-juno"

            - name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-lumex-1"
              current-parameters: true
              kill-phase-on: "NEVER"
              enable-condition: "!('{gerrit_branch}' ==~ /^lts-v2[.](8|10|12)$/)"
              predefined-parameters: "TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-lumex-1"

            - name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-spm-lumex-1"
              current-parameters: true
              kill-phase-on: "NEVER"
              enable-condition: "!('{gerrit_branch}' ==~ /^lts-v2[.](8|10|12)$/)"
              predefined-parameters: "TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-spm-lumex-1"

            - name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-base-fvp"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-base-fvp"

            - name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-reboot-base-fvp"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-reboot-base-fvp"

            - name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-reboot-juno"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-reboot-juno"

            - name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-extensive-base-fvp"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-extensive-base-fvp"

            - name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-extensive-juno"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-extensive-juno"

      - multijob:
          name: "Generate visualizations"
          condition: "COMPLETED"

          projects:
            - name: "tf-a-sloc-visualization"
              current-parameters: true
              kill-phase-on: "NEVER"

            - name: "tf-a-test-category-visualization"
              current-parameters: true
              kill-phase-on: "NEVER"

            - name: "tf-a-test-result-visualization"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TARGET_BUILD=${{JOB_NAME}}/${{BUILD_NUMBER}}"
