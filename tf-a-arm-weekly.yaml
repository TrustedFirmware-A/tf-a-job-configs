- job:
    name: "tf-a-arm-weekly"
    node: "docker-amd64-tf-a-jammy"
    project-type: "multijob"
    concurrent: true
    disabled: false
    description: "Weekly TF-A instrumentation tests."

    properties:
      - tf-a-ci-scripts:
          download_server_url: "https://downloads.trustedfirmware.org"
          download_server_tf_a_url: "https://downloads.trustedfirmware.org/tf-a"

      - build-discarder:
          days-to-keep: 30

    parameters:
      - tf-a-gerrit-change-based-patchset-parameters:
          gerrit_project: "{gerrit_project_prefix}TF-A/trusted-firmware-a"
          gerrit_branch: "master"
          gerrit_refspec: "master"

      - tf-a-builder-parameters:
          tf_a_project: "${{GERRIT_PROJECT}}"
          tf_a_branch: "${{GERRIT_REFSPEC}}"

          rf_a_project: "RF-A/rusted-firmware-a"
          rf_a_branch: "main"

          tftf_project: "TF-A/tf-a-tests"
          tftf_branch: "master"

          tf_m_tests_project: "TF-M/tf-m-tests"
          tf_m_tests_branch: "tfa_ci_dep_revision"

          tf_m_extras_project: "TF-M/tf-m-extras"
          tf_m_extras_branch: "tfa_ci_dep_revision"

          hafnium_project: "hafnium/hafnium"
          hafnium_branch: "master"

          tf_rmm_project: "TF-RMM/tf-rmm"
          tf_rmm_branch: "main"

          tfut_project: "TF-A/tf-a-unit-tests"
          tfut_branch: "main"

          tf_a_ci_scripts_project: "ci/tf-a-ci-scripts"
          tf_a_ci_scripts_branch: "master"
          tf_a_ci_scripts_mbed_tls_version: "3.6.5"

          lava_priority: "low"

    wrappers:
      - "timestamps"

    builders:
      - multijob:
          name: "Run instrumentation tests"
          condition: "COMPLETED"

          projects:
            - name: "tf-a-ci-gateway"
              alias: "tf-a-l3-instrumentation-psci-arm-juno"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-a-l3-instrumentation-psci-arm-juno"

            - name: "tf-a-ci-gateway"
              alias: "tf-a-l3-instrumentation-psci-arm-n1sdp"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-a-l3-instrumentation-psci-arm-n1sdp"

            - name: "tf-a-ci-gateway"
              alias: "tf-a-l3-instrumentation-simd-crypto-arm-juno"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-a-l3-instrumentation-simd-crypto-arm-juno"

            - name: "tf-a-ci-gateway"
              alias: "tf-a-l3-instrumentation-simd-crypto-arm-n1sdp"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-a-l3-instrumentation-simd-crypto-arm-n1sdp"

    triggers:
      - timed: "0 14 * * 7"
