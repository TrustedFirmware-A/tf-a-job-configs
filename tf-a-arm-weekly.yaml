- job:
    name: "tf-a-arm-weekly"
    node: "docker-amd64-tf-a-jammy"
    project-type: "multijob"
    concurrent: true
    disabled: false
    description: "CI job for both coverage and fuzzing."

    properties:
      - tf-a-ci-scripts:
          download_server_url: "https://downloads.trustedfirmware.org"
          download_server_tf_a_url: "https://downloads.trustedfirmware.org/tf-a"

      - build-discarder:
          days-to-keep: 30

    parameters:
      - tf-a-builder-parameters:
          default_tf_a_project: "${{GERRIT_PROJECT}}"
          default_tf_a_branch: "${{GERRIT_REFSPEC}}"

      - tf-a-gerrit-change-based-patchset-parameters:
          gerrit_project: "{gerrit_project_prefix}TF-A/trusted-firmware-a"
          gerrit_branch: "master"
          gerrit_refspec: "master"

      - string:
          name: "TF_GERRIT_BRANCH"
          default: "master"

      - string:
          name: "TFTF_GERRIT_BRANCH"
          default: "master"

      - string:
          name: "LAVA_PRIORITY"
          default: "low"

    wrappers:
      - "timestamps"

    builders:
      - multijob:
          name: "TFTF Fuzzing"
          condition: "COMPLETED"

          projects:
            - name: "tf-a-ci-gateway"
              alias: "tf-l3-fuzzing SDEI"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tf-l3-fuzzing"

      # participate in the job's success/failure.
      - trigger-builds:
          - project: "tf-a-ci-coverage-gateway"
            block: true
            current-parameters: true

    triggers:
      - timed: "59 23 * * 7"
