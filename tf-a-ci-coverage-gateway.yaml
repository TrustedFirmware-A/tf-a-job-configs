- job:
    name: "tf-a-ci-coverage-gateway"
    node: "docker-amd64-tf-a-jammy"
    project-type: "freestyle"
    concurrent: true
    disabled: false

    description: |
      Main job entry point for a Trusted Firmware A with coverage focus(TF-A) CI.

    properties:
      - tf-a-ci-scripts:
          download_server_url: "https://downloads.trustedfirmware.org"
          download_server_tf_a_url: "https://downloads.trustedfirmware.org/tf-a"

      - build-discarder:
          days-to-keep: 30

      - throttle:
          option: "project"
          enabled: true
          max-per-node: 3
          max-total: 10

    wrappers:
      - credentials-binding:
          - ssh-user-private-key:
              credential-id: "TFA_CI_BOT_USER_SSH_KEY"
              key-file-variable: "CI_BOT_KEY"
              username-variable: "CI_BOT_USERNAME"
              passphrase-variable: ""

      - timeout:
          timeout: 240
          fail: true

      - "timestamps"

    parameters:
      - tf-a-clone-parameters:
          projects: "trusted-firmware-a,tf-a-ci-scripts,tf-a-tests,tf-m-extras,tf-m-tests,tf-rmm,spm"

      - tf-a-builder-parameters:
          default_gerrit_project: "{gerrit_project_prefix}TF-A/trusted-firmware-a"
          default_gerrit_branch: "master"

          default_tf_a_project: "${{GERRIT_PROJECT}}"
          default_tf_a_branch: "${{GERRIT_REFSPEC}}"
          default_tf_a_mbedtls_version: "3.6.5"

          default_rf_a_project: "{gerrit_project_prefix}RF-A/rusted-firmware-a"
          default_rf_a_branch: "main"

          default_tftf_project: "{gerrit_project_prefix}TF-A/tf-a-tests"
          default_tftf_branch: "master"

          default_tf_m_tests_project: "{gerrit_project_prefix}TF-M/tf-m-tests"
          default_tf_m_tests_branch: "tfa_ci_dep_revision"

          default_tf_m_extras_project: "{gerrit_project_prefix}TF-M/tf-m-extras"
          default_tf_m_extras_branch: "tfa_ci_dep_revision"

          default_hafnium_project: "{gerrit_project_prefix}hafnium/hafnium"
          default_hafnium_branch: "master"

          default_tf_rmm_project: "{gerrit_project_prefix}TF-RMM/tf-rmm"
          default_tf_rmm_branch: "main"

          default_tfut_project: "{gerrit_project_prefix}TF-A/tf-a-unit-tests"
          default_tfut_branch: "main"

          default_tf_a_ci_scripts_project: "{gerrit_project_prefix}ci/tf-a-ci-scripts"
          default_tf_a_ci_scripts_branch: "master"

          default_tf_a_ci_jobs_project: "{gerrit_project_prefix}ci/tf-a-job-configs.git"
          default_tf_a_ci_jobs_branch: "master"

      - string:
          name: "TEST_GROUPS"
          default: "tf-l3-code-coverage"

          description: |
            White space separated list of test configs: can be mix of specific
            test configs (e.g., <code>l1/fvp-default:fvp-linux-default</code>) and
            group names (e.g., <code>l1 l2</code>).

    scm:
      - git:
          url: "ssh://review.trustedfirmware.org:29418/ci/tf-a-ci-scripts"
          credentials-id: "TFA_CI_BOT_USER_SSH_KEY"
          basedir: "tf-a-ci-scripts"

          refspec: "${{CI_REFSPEC}}"
          branches: ["master"]

          extensions:
            - choosing-strategy: "gerrit"
            - honor-refspec: true

    builders:
      - shell: |
          #!/bin/bash
          set -e
          CI_ROOT=${{PWD}}/tf-a-ci-scripts
          export workspace=$PWD
          export test_groups=$TEST_GROUPS
          $CI_ROOT/script/gen_test_desc.py

      - trigger-builds:
          - project:
              - "tf-a-builder"

            block: true
            current-parameters: true

            predefined-parameters: |
              CLONE_REPOS=${{CLONE_REPOS}}

            parameter-factories:
              - factory: "filebuild"
                file-pattern: "*.testprop"
                no-files-found-action: "FAIL"

    publishers:
      - postbuildscript:
          builders:
            - role: "SLAVE"

              build-on:
                - "SUCCESS"
                - "FAILURE"
                - "UNSTABLE"
                - "ABORTED"
                - "NOT_BUILT"

              build-steps:
                - shell: |-
                    #!/bin/bash -e
                    export CI_ROOT=${{PWD}}/tf-a-ci-scripts
                    bash "$CI_ROOT/job/tf-ci-gateway/generate_report.sh"

      - archive:
          artifacts: "report.json, report.html, merge/outdir/**"
          follow-symlinks: true

      - groovy-postbuild:
          script: !include-raw-verbatim:
            - "tf-a-ci-gateway/postbuild.groovy"
