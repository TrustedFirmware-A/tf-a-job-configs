- job-template:
    id: "tf-a-gerrit-tforg-l2"
    project-type: "multijob"

    name: "{base}-gerrit-tforg-l2"
    node: "{node}"

    description: >
      Automated validation for patches submitted to <strong>{label}</strong>,
      limited to low- and medium-intensity test suites only.

    concurrent: true
    disabled: false

    properties:
      - "tf-a-clone-properties"

      - tf-a-ci-scripts:
          download_server_url: "https://downloads.trustedfirmware.org"
          download_server_tf_a_url: "https://downloads.trustedfirmware.org/{downloads_space}"

      - build-discarder:
          days-to-keep: 30

    parameters:
      - tf-a-gerrit-comment-added-parameters:
          gerrit_project: "{gerrit_project_prefix}TF-A/trusted-firmware-a"
          gerrit_branch: "{gerrit_branch}"
          gerrit_refspec: "{gerrit_refspec}"

      - tf-a-builder-parameters:
          tf_a_project: "${{GERRIT_PROJECT}}"
          tf_a_branch: "${{GERRIT_REFSPEC}}"

          rf_a_project: "{rf_a_project}"
          rf_a_branch: "{rf_a_branch}"

          tftf_project: "{tftf_project}"
          tftf_branch: "{tftf_branch}"

          tf_m_tests_project: "{tf_m_tests_project}"
          tf_m_tests_branch: "{tf_m_tests_branch}"

          tf_m_extras_project: "{tf_m_extras_project}"
          tf_m_extras_branch: "{tf_m_extras_branch}"

          hafnium_project: "{hafnium_project}"
          hafnium_branch: "{hafnium_branch}"

          tf_rmm_project: "{tf_rmm_project}"
          tf_rmm_branch: "{tf_rmm_branch}"

          tfut_project: "{tfut_project}"
          tfut_branch: "{tfut_branch}"

          tf_a_ci_scripts_project: "{tf_a_ci_scripts_project}"
          tf_a_ci_scripts_branch: "{tf_a_ci_scripts_branch}"
          tf_a_ci_scripts_mbed_tls_version: "{tf_a_ci_scripts_mbed_tls_version}"

          lava_priority: "medium"

    wrappers:
      - credentials-binding:
          - ssh-user-private-key:
              credential-id: "TFA_CI_BOT_USER_SSH_KEY"
              key-file-variable: "CI_BOT_KEY"
              username-variable: "CI_BOT_USERNAME"
              passphrase-variable: ""

      - timestamps:

    builders:
      - multijob:
          condition: "COMPLETED"
          name: "Run level 1 tests"

          projects:
            - kill-phase-on: "NEVER"
              name: "{base}-gerrit-tforg-l1"
              current-parameters: true

      - multijob:
          condition: "COMPLETED"
          name: "Run analysis tests"

          projects:
            - name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-analysis-scan-build-arm-fvp"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-analysis-scan-build-arm-fvp"

            - name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-analysis-scan-build-arm-juno"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-analysis-scan-build-arm-juno"

      - multijob:
          condition: "COMPLETED"
          name: "Run integration tests"

          projects:
            - name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-integration-depthcharge-mediatek-mt8186"
              current-parameters: true
              kill-phase-on: "NEVER"
              enable-condition: "'{gerrit_branch}' ==~ /^(master|lts-v2[.]10|lts-v2[.]12|lts-v2[.]14)$/"
              predefined-parameters: "TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-integration-depthcharge-mediatek-mt8186"

            - name: "{base}-ci-gateway"
