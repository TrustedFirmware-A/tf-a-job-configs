- job-template:
    id: "tf-a-gerrit-tforg-l2"
    project-type: "multijob"

    name: "{base}-gerrit-tforg-l2"
    node: "{node}"

    description: >
      Automated validation for patches submitted to <strong>{label}</strong>,
      limited to low- and medium-intensity test suites only.

    concurrent: true
    disabled: false

    properties:
      - "tf-a-clone-properties"

      - tf-a-ci-scripts:
          download_server_url: "https://downloads.trustedfirmware.org"
          download_server_tf_a_url: "https://downloads.trustedfirmware.org/{downloads_space}"

      - build-discarder:
          days-to-keep: 30

    parameters:
      - tf-a-gerrit-comment-added-parameters:
          gerrit_project: "{gerrit_project_prefix}TF-A/trusted-firmware-a"
          gerrit_branch: "{gerrit_branch}"
          gerrit_refspec: "{gerrit_refspec}"

      - tf-a-builder-parameters:
          tf_a_project: "${{GERRIT_PROJECT}}"
          tf_a_branch: "${{GERRIT_REFSPEC}}"

          rf_a_project: "{rf_a_project}"
          rf_a_branch: "{rf_a_branch}"

          tftf_project: "{tftf_project}"
          tftf_branch: "{tftf_branch}"

          tf_m_tests_project: "{tf_m_tests_project}"
          tf_m_tests_branch: "{tf_m_tests_branch}"

          tf_m_extras_project: "{tf_m_extras_project}"
          tf_m_extras_branch: "{tf_m_extras_branch}"

          hafnium_project: "{hafnium_project}"
          hafnium_branch: "{hafnium_branch}"

          tf_rmm_project: "{tf_rmm_project}"
          tf_rmm_branch: "{tf_rmm_branch}"

          tfut_project: "{tfut_project}"
          tfut_branch: "{tfut_branch}"

          tf_a_ci_scripts_project: "{tf_a_ci_scripts_project}"
          tf_a_ci_scripts_branch: "{tf_a_ci_scripts_branch}"
          tf_a_ci_scripts_mbed_tls_version: "{tf_a_ci_scripts_mbed_tls_version}"

          lava_priority: "medium"

    wrappers:
      - credentials-binding:
          - ssh-user-private-key:
              credential-id: "TFA_CI_BOT_USER_SSH_KEY"
              key-file-variable: "CI_BOT_KEY"
              username-variable: "CI_BOT_USERNAME"
              passphrase-variable: ""

      - timestamps:

    builders:
      - multijob:
          condition: "COMPLETED"
          name: "Run level 1 tests"

          projects:
            - kill-phase-on: "NEVER"
              name: "{base}-gerrit-tforg-l1"
              current-parameters: true

      - multijob:
          condition: "COMPLETED"
          name: "Run functional tests"

          projects:
            - kill-phase-on: "NEVER"
              name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-functional-tests-spm-base-fvp"
              current-parameters: true

              predefined-parameters: |
                TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-functional-tests-spm-base-fvp

            - kill-phase-on: "NEVER"
              name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-functional-tests-spm-mm-base-fvp"
              current-parameters: true

              predefined-parameters: |
                TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-functional-tests-spm-mm-base-fvp

            - kill-phase-on: "NEVER"
              name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-functional-tests-linux-aarch32-base-fvp"
              current-parameters: true

              predefined-parameters: |
                TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-functional-tests-linux-aarch32-base-fvp

            - kill-phase-on: "NEVER"
              name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-functional-tests-linux-base-fvp"
              current-parameters: true

              predefined-parameters: |
                TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-functional-tests-linux-base-fvp

            - kill-phase-on: "NEVER"
              name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-functional-tests-linux-juno"
              current-parameters: true

              predefined-parameters: |
                TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-functional-tests-linux-juno

            - kill-phase-on: "NEVER"
              name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-functional-tests-linux-n1sdp"
              current-parameters: true

              predefined-parameters: |
                TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-functional-tests-linux-n1sdp

            - kill-phase-on: "NEVER"
              name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-functional-tests-linux-lumex-1"
              current-parameters: true
              enable-condition: "!('{gerrit_branch}' ==~ /^lts-v2[.](8|10)$/)"

              predefined-parameters: |
                TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-functional-tests-linux-lumex-1

            - kill-phase-on: "NEVER"
              name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-functional-tests-linux-shutdown-juno"
              current-parameters: true

              predefined-parameters: |
                TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-functional-tests-linux-shutdown-juno

            - kill-phase-on: "NEVER"
              name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-functional-tests-platforms"
              current-parameters: true

              predefined-parameters: |
                TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-functional-tests-platforms

      - multijob:
          condition: "COMPLETED"
          name: "Run integration tests"

          projects:
            - kill-phase-on: "NEVER"
              name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-fwu"
              current-parameters: true

              predefined-parameters: |
                TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-fwu

            - kill-phase-on: "NEVER"
              name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-spm-base-fvp"
              current-parameters: true

              predefined-parameters: |
                TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-spm-base-fvp

            - kill-phase-on: "NEVER"
              name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-spm-mm-base-fvp"
              current-parameters: true

              predefined-parameters: |
                TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-spm-mm-base-fvp

            - kill-phase-on: "NEVER"
              name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-rmm-base-fvp"
              current-parameters: true

              predefined-parameters: |
                TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-rmm-base-fvp

            - kill-phase-on: "NEVER"
              name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-dynamiq-base-fvp"
              current-parameters: true

              predefined-parameters: |
                TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-dynamiq-base-fvp

            - kill-phase-on: "NEVER"
              name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-juno"
              current-parameters: true

              predefined-parameters: |
                TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-juno

            - kill-phase-on: "NEVER"
              name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-power-cycle-juno"
              current-parameters: true

              predefined-parameters: |
                TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-power-cycle-juno

            - kill-phase-on: "NEVER"
              name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-reset2-juno"
              current-parameters: true

              predefined-parameters: |
                TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-reset2-juno

            - kill-phase-on: "NEVER"
              name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-lumex-1"
              current-parameters: true
              enable-condition: "!('{gerrit_branch}' ==~ /^lts-v2[.](8|10|12)$/)"

              predefined-parameters: |
                TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-lumex-1

            - kill-phase-on: "NEVER"
              name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-spm-lumex-1"
              current-parameters: true
              enable-condition: "!('{gerrit_branch}' ==~ /^lts-v2[.](8|10|12)$/)"

              predefined-parameters: |
                TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-spm-lumex-1

            - kill-phase-on: "NEVER"
              name: "{base}-ci-gateway"
              alias: "{tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-base-fvp"
              current-parameters: true

              predefined-parameters: |
                TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-integration-tests-tftf-base-fvp

    triggers:
      - gerrit:
          server-name: "review.trustedfirmware.org"

          trigger-on:
            - comment-added-event:
                approval-category: "Allow-CI"
                approval-value: 2

          projects:
            - project-compare-type: "PLAIN"
              project-pattern: "{gerrit_project_prefix}TF-A/trusted-firmware-a"

              branches:
                - branch-compare-type: "PLAIN"
                  branch-pattern: "{gerrit_refspec}"

          override-votes: true
          gerrit-build-started-verified-value: 0
          gerrit-build-successful-verified-value: 1
          gerrit-build-failed-verified-value: -1
          gerrit-build-unstable-verified-value: -1
          gerrit-build-notbuilt-verified-value: 0
          gerrit-build-started-codereview-value: 0
          gerrit-build-successful-codereview-value: 0
          gerrit-build-failed-codereview-value: 0
          gerrit-build-unstable-codereview-value: 0
          gerrit-build-notbuilt-codereview-value: 0
          failure-message: "OpenCI: build failed"
          successful-message: "OpenCI: build successful"
          unstable-message: "OpenCI: build unstable"
          notbuilt-message: "OpenCI: no builds executed"
          silent: false
          silent-start: false
