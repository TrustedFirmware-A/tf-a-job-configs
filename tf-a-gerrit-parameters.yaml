- parameter:
    name: "tf-a-gerrit-event-type-parameter"

    parameters:
      - string:
          name: "GERRIT_EVENT_TYPE"
          default: "{gerrit_event_type|}"

          description: >
            Gerrit event type, e.g.:

            <ul>
              <li><code>comment-added</code></li>
              <li><code>patchset-created</code></li>
              <li><code>ref-updated</code></li>
            </ul>

- parameter:
    name: "tf-a-gerrit-event-hash-parameter"

    parameters:
      - string:
          name: "GERRIT_EVENT_HASH"
          default: "{gerrit_event_hash|}"

          description: >
            Hashcode of the Gerrit event object, e.g.:

            <ul>
              <li><code>396308401</code></li>
              <li><code>-1454080179</code></li>
            </ul>

- parameter:
    name: "tf-a-gerrit-name-parameter"

    parameters:
      - string:
          name: "GERRIT_NAME"
          default: "{gerrit_name|}"

          description: >
            Gerrit server name configured in Jenkins, e.g.:

            <ul>
              <li><code>review.trustedfirmware.org</code></li>
              <li><code>gerrit.example.org</code></li>
            </ul>

- parameter:
    name: "tf-a-gerrit-host-parameter"

    parameters:
      - string:
          name: "GERRIT_HOST"
          default: "{gerrit_host|}"

          description: >
            Gerrit hostname, e.g.:

            <ul>
              <li><code>review.trustedfirmware.org</code></li>
              <li><code>gerrit.example.org</code></li>
            </ul>

- parameter:
    name: "tf-a-gerrit-port-parameter"

    parameters:
      - string:
          name: "GERRIT_PORT"
          default: "{gerrit_port|}"

          description: >
            Gerrit port, e.g.:

            <ul>
              <li><code>29418</code></li>
              <li><code>35234</code></li>
            </ul>

- parameter:
    name: "tf-a-gerrit-scheme-parameter"

    parameters:
      - string:
          name: "GERRIT_SCHEME"
          default: "{gerrit_scheme|}"

          description: >
            Gerrit URL scheme, e.g.:

            <ul>
              <li><code>https</code></li>
              <li><code>http</code></li>
              <li><code>ssh</code></li>
            </ul>

- parameter:
    name: "tf-a-gerrit-version-parameter"

    parameters:
      - string:
          name: "GERRIT_VERSION"
          default: "{gerrit_version|}"

          description: >
            Gerrit server version string, e.g.:

            <ul>
              <li><code>3.9.1</code></li>
              <li><code>3.11.0</code></li>
              <li><code>3.12.2-27-gcf7d13a276</code></li>
            </ul>

- parameter:
    name: "tf-a-gerrit-project-parameter"

    parameters:
      - string:
          name: "GERRIT_PROJECT"
          default: "{gerrit_project|}"

          description: >
            Gerrit project containing the change, e.g.:

            <ul>
              <li><code>TF-A/trusted-firmware-a</code></li>
              <li><code>TF-A/tf-a-tests</code></li>
            </ul>

- parameter:
    name: "tf-a-gerrit-ref-updated-refname-parameter"

    parameters:
      - string:
          name: "GERRIT_REFNAME"
          default: "{gerrit_refname|}"

          description: >
            Name of the updated ref, e.g.:

            <ul>
              <li><code>master</code></li>
              <li><code>refs/tags/lts-v2.14.1</code></li>
            </ul>

- parameter:
    name: "tf-a-gerrit-ref-updated-oldrev-parameter"

    parameters:
      - string:
          name: "GERRIT_OLDREV"
          default: "{gerrit_oldrev|}"

          description: >
            Revision before the ref update, e.g.:

            <ul>
              <li><code>0000000000000000000000000000000000000000</code></li>
              <li><code>8d5b6f6c7f1a2d9b4e6c8a0f3e2d1c4b5a697887</code></li>
            </ul>

- parameter:
    name: "tf-a-gerrit-newrev-parameter"

    parameters:
      - string:
          name: "GERRIT_NEWREV"
          default: "{gerrit_newrev|}"

          description: >
            New revision associated with the event, e.g.:

            <ul>
              <li><code>1c26b1869f517d9726f6f0f6c7e8fa2050b6d924</code></li>
              <li><code>f4ab901257f8c2d2f7a3d8c95cc91d4a34f67120</code></li>
            </ul>

- parameter:
    name: "tf-a-gerrit-change-branch-parameter"

    parameters:
      - string:
          name: "GERRIT_BRANCH"
          default: "{gerrit_branch|}"

          description: >
            Git branch targeted by the change under test, e.g.:

            <ul>
              <li><code>master</code></li>
              <li><code>integration</code></li>
              <li><code>lts-v2.14</code></li>
            </ul>

- parameter:
    name: "tf-a-gerrit-change-topic-parameter"

    parameters:
      - string:
          name: "GERRIT_TOPIC"
          default: "{gerrit_topic|}"

          description: >
            Gerrit topic of the change, e.g.:

            <ul>
              <li><code>spm-fwu-series</code></li>
              <li><code>rme-ci-fixes</code></li>
            </ul>

- parameter:
    name: "tf-a-gerrit-old-topic-parameter"

    parameters:
      - string:
          name: "GERRIT_OLD_TOPIC"
          default: "{gerrit_old_topic|}"

          description: >
            Topic before the change, e.g.:

            <ul>
              <li><code>spm-fwu-series</code></li>
              <li><code>rme-ci-fixes</code></li>
            </ul>

- parameter:
    name: "tf-a-gerrit-patchset-refspec-parameter"

    parameters:
      - string:
          name: "GERRIT_REFSPEC"
          default: "{gerrit_refspec|}"

          description: >
            Gerrit refspec of the patch set, e.g.:

            <ul>
              <li><code>refs/changes/09/45309/12</code></li>
              <li><code>refs/changes/23/47123/3</code></li>
            </ul>

- parameter:
    name: "tf-a-gerrit-patchset-revision-parameter"

    parameters:
      - string:
          name: "GERRIT_PATCHSET_REVISION"
          default: "{gerrit_patchset_revision|}"

          description: >
            Git revision of the patch set, e.g.:

            <ul>
              <li><code>1c26b1869f517d9726f6f0f6c7e8fa2050b6d924</code></li>
              <li><code>f4ab901257f8c2d2f7a3d8c95cc91d4a34f67120</code></li>
            </ul>

- parameter:
    name: "tf-a-gerrit-patchset-number-parameter"

    parameters:
      - string:
          name: "GERRIT_PATCHSET_NUMBER"
          default: "{gerrit_patchset_number|}"

          description: >
            Patch set number, e.g.:

            <ul>
              <li><code>1</code></li>
              <li><code>12</code></li>
            </ul>

- parameter:
    name: "tf-a-gerrit-change-number-parameter"

    parameters:
      - string:
          name: "GERRIT_CHANGE_NUMBER"
          default: "{gerrit_change_number|}"

          description: >
            Numeric Gerrit change number, e.g.:

            <ul>
              <li><code>45309</code></li>
              <li><code>47123</code></li>
            </ul>

- parameter:
    name: "tf-a-gerrit-change-id-parameter"

    parameters:
      - string:
          name: "GERRIT_CHANGE_ID"
          default: "{gerrit_change_id|}"

          description: >
            Gerrit Change-Id from the commit message footer, e.g.:

            <ul>
              <li><code>Iabc123def4567890abc123def4567890abc123de</code></li>
              <li><code>I0123456789abcdef0123456789abcdef01234567</code></li>
            </ul>

- parameter:
    name: "tf-a-gerrit-change-subject-parameter"

    parameters:
      - string:
          name: "GERRIT_CHANGE_SUBJECT"
          default: "{gerrit_change_subject|}"
          description: "One-line subject of the change (first line of the commit message)."

- parameter:
    name: "tf-a-gerrit-change-url-parameter"

    parameters:
      - string:
          name: "GERRIT_CHANGE_URL"
          default: "{gerrit_change_url|}"

          description: >
            Web URL of the Gerrit change, e.g.:

            <ul>
              <li><code>https://review.trustedfirmware.org/c/TF-A/trusted-firmware-a/+/49026</code></li>
              <li><code>https://review.trustedfirmware.org/c/TF-A/tf-a-tests/+/48738</code></li>
            </ul>

- parameter:
    name: "tf-a-gerrit-change-hashtags-parameter"

    parameters:
      - string:
          name: "GERRIT_HASHTAGS"
          default: "{gerrit_hashtags|}"

          description: >
            Change hashtags, e.g.:

            <ul>
              <li><code>security,ci</code></li>
              <li><code>rme,tests</code></li>
            </ul>

- parameter:
    name: "tf-a-gerrit-added-hashtags-parameter"

    parameters:
      - string:
          name: "GERRIT_ADDED_HASHTAGS"
          default: "{gerrit_added_hashtags|}"

          description: >
            Hashtags added by the hashtags-changed event, e.g.:

            <ul>
              <li><code>security,ci</code></li>
              <li><code>release,rme</code></li>
            </ul>

- parameter:
    name: "tf-a-gerrit-removed-hashtags-parameter"

