- project:
    name: "rf-a"
    base: "rf-a"

    views:
      - tf-a-view:
          name: "RF-A"
          description: "Rusted Firmware-A"
          regex: "^rf-a(-.*)?$"

    jobs:
      - tf-a-gateway-chain:
          node: "docker-amd64-tf-a-jammy"

          label: "RF-A"

          downloads_space: "tf-a"
          default_clones: "tf-a-ci-scripts,trusted-firmware-a,rusted-firmware-a"

          armclang_version: "6.23"
          armclang_warehouse_version: "6.23/37"

          default_groups: "rfa-fvp/fvp,nil,fvp-rfa:fvp-rfa-fip.rfa"
          default_config: "fvp,nil,fvp-rfa:fvp-rfa-fip.rfa"
          default_config_desc: "0000%rfa-fvp%fvp-rfa,nil,nil,nil,fvp,nil:fvp-rfa-fip.rfa.test"

          default_gerrit_project: "RF-A/rusted-firmware-a"
          default_gerrit_branch: "main"

          default_tf_a_project: "TF-A/trusted-firmware-a"
          default_tf_a_branch: "master"
          default_tf_a_mbedtls_version: "3.6.5"

          default_rf_a_project: "${{GERRIT_PROJECT}}"
          default_rf_a_branch: "${{GERRIT_REFSPEC}}"

          default_tftf_project: "TF-A/tf-a-tests"
          default_tftf_branch: "master"

          default_tf_m_tests_project: "TF-M/tf-m-tests"
          default_tf_m_tests_branch: "tfa_ci_dep_revision"

          default_tf_m_extras_project: "TF-M/tf-m-extras"
          default_tf_m_extras_branch: "tfa_ci_dep_revision"

          default_hafnium_project: "hafnium/hafnium"
          default_hafnium_branch: "master"

          default_tf_rmm_project: "TF-RMM/tf-rmm"
          default_tf_rmm_branch: "main"

          default_tfut_project: "TF-A/tf-a-unit-tests"
          default_tfut_branch: "main"

          default_tf_a_ci_scripts_project: "ci/tf-a-ci-scripts"
          default_tf_a_ci_scripts_branch: "master"

          default_tf_a_ci_jobs_project: "ci/tf-a-job-configs"
          default_tf_a_ci_jobs_branch: "master"
