- job:
    name: "tf-a-lts2.10-main"
    node: "docker-amd64-tf-a-lts2.10-jammy"
    project-type: "multijob"
    concurrent: true
    disabled: false
    description: "Main CI job for Trusted Firmware."

    properties:
      - tf-a-ci-scripts:
          download_server_url: "https://downloads.trustedfirmware.org"
          download_server_tf_a_url: "https://downloads.trustedfirmware.org/tf-a-lts-v2.10"

      - throttle:
          option: "project"
          enabled: true
          max-total: 5

      - build-discarder:
          days-to-keep: 30

    parameters:
      - tf-a-clone-parameters:
          projects: "trusted-firmware-a,tf-a-ci-scripts,tf-a-tests,tf-m-extras,tf-m-tests,tf-rmm,spm"

      - tf-a-builder-parameters:
          default_gerrit_project: "{gerrit_project_prefix}TF-A/trusted-firmware-a"
          default_gerrit_branch: "lts-v2.10"

          default_tf_a_project: "${{GERRIT_PROJECT}}"
          default_tf_a_branch: "${{GERRIT_REFSPEC}}"
          default_tf_a_mbedtls_version: "3.6.4"

          default_rf_a_project: "{gerrit_project_prefix}RF-A/rusted-firmware-a"
          default_rf_a_branch: "main"

          default_tftf_project: "{gerrit_project_prefix}TF-A/tf-a-tests"
          default_tftf_branch: "lts-v2.10"

          default_tf_m_tests_project: "{gerrit_project_prefix}TF-M/tf-m-tests"
          default_tf_m_tests_branch: "95d3407a65e26fb3a4319ab38c257e50c9ee804f"

          default_tf_m_extras_project: "{gerrit_project_prefix}TF-M/tf-m-extras"
          default_tf_m_extras_branch: "master"

          default_hafnium_project: "{gerrit_project_prefix}hafnium/hafnium"
          default_hafnium_branch: "v2.10"

          default_tf_rmm_project: "{gerrit_project_prefix}TF-RMM/tf-rmm"
          default_tf_rmm_branch: "main"

          default_tfut_project: "{gerrit_project_prefix}TF-A/tf-a-unit-tests"
          default_tfut_branch: "main"

          default_tf_a_ci_scripts_project: "{gerrit_project_prefix}ci/tf-a-ci-scripts"
          default_tf_a_ci_scripts_branch: "master"

          default_tf_a_ci_jobs_project: "{gerrit_project_prefix}ci/tf-a-job-configs.git"
          default_tf_a_ci_jobs_branch: "master"

      - string:
          name: "TF_GERRIT_BRANCH"
          default: "lts-v2.10"

      - string:
          name: "TFTF_GERRIT_BRANCH"
          default: "lts-v2.10"

      - bool:
          name: "FORCE_TO_BUILD"
          default: false

          description: |
            If there are no new commits in trusted-firmware-a tf-a-tests, or tf-a-ci-scripts the build will be sikpped.
            However, you can always force to run the build

    triggers:
      - timed: "H H(0-7) * * 1,3,5"

    wrappers:
      - credentials-binding:
          - ssh-user-private-key:
              credential-id: "TFA_CI_BOT_USER_SSH_KEY"
              key-file-variable: "CI_BOT_KEY"
              username-variable: "CI_BOT_USERNAME"
              passphrase-variable: ""

      - "timestamps"

    builders:
      - tf-a-clone:
          projects: "${{CLONE_REPOS}}"

      - shell: |
          #!/bin/bash
          set -e
          cat << EOF > tf-a-env.param
          GERRIT_PROJECT=${{TF_GERRIT_PROJECT}}
          GERRIT_BRANCH=${{TF_GERRIT_BRANCH}}
          GERRIT_REFSPEC=${{TF_GERRIT_REFSPEC}}
          EOF
          cat << EOF > tf-a-tests-env.param
          GERRIT_PROJECT=${{TFTF_GERRIT_PROJECT}}
          GERRIT_BRANCH=${{TFTF_GERRIT_BRANCH}}
          GERRIT_REFSPEC=${{TFTF_GERRIT_REFSPEC}}
          EOF

      - shell: !include-raw-verbatim: "scripts/lts-check-last-commit.sh"

      - conditional-step:
          condition-kind: "file-exists"
          condition-filename: "TO_BUILD"
          condition-basedir: "workspace"

          steps:
            - multijob:
                name: "Run static checks on the code"
                condition: "COMPLETED"

                projects:
                  - name: "tf-a-static-checks"
                    current-parameters: true
                    kill-phase-on: "NEVER"
                    property-file: "tf-a-env.param"

            - multijob:
                name: "Build Trusted Firmware"
                condition: "COMPLETED"

                projects:
                  - name: "tf-a-lts2.10-ci-gateway"
                    alias: "tf-l1-build-fvp tf-l2-build-fvp"
                    current-parameters: true
                    kill-phase-on: "NEVER"

                    predefined-parameters: |
                      TEST_GROUPS=tf-l1-build-fvp-lts-v2.10 tf-l2-build-fvp-lts-v2.10

                    property-file: "tf-a-env.param"

                  - name: "tf-a-lts2.10-ci-gateway"
                    alias: "tf-l1-build-juno tf-l2-build-juno"
                    current-parameters: true
                    kill-phase-on: "NEVER"
                    predefined-parameters: "TEST_GROUPS=tf-l1-build-juno-lts-v2.10 tf-l2-build-juno-lts-v2.10"
                    property-file: "tf-a-env.param"

                  - name: "tf-a-lts2.10-ci-gateway"
                    alias: "tf-l1-build-plat"
                    current-parameters: true
                    kill-phase-on: "NEVER"
                    predefined-parameters: "TEST_GROUPS=tf-l1-build-plat-lts-v2.10"
                    property-file: "tf-a-env.param"

                  - name: "tf-a-lts2.10-ci-gateway"
                    alias: "tf-l1-build-clang"
                    current-parameters: true
                    kill-phase-on: "NEVER"
                    predefined-parameters: "TEST_GROUPS=tf-l1-build-clang-lts-v2.10"
                    property-file: "tf-a-env.param"

            - multijob:
                name: "TFTF Tests for FVP"
                condition: "COMPLETED"

                projects:
                  - name: "tf-a-lts2.10-ci-gateway"
                    alias: "tftf-l2-fwu"
                    current-parameters: true
                    kill-phase-on: "NEVER"
                    predefined-parameters: "TEST_GROUPS=tftf-l2-fwu-lts-v2.10"
                    property-file: "tf-a-tests-env.param"

                  - name: "tf-a-lts2.10-ci-gateway"
                    alias: "tftf-l1-fvp tftf-l2-fvp-auxiliary"
                    current-parameters: true
                    kill-phase-on: "NEVER"
                    predefined-parameters: "TEST_GROUPS=tftf-l1-fvp-lts-v2.10 tftf-l2-fvp-auxiliary-lts-v2.10"
                    property-file: "tf-a-tests-env.param"

                  - name: "tf-a-lts2.10-ci-gateway"
                    alias: "tftf-l2-fvp tftf-l2-fvp-dynamiq"
                    current-parameters: true
                    kill-phase-on: "NEVER"
                    predefined-parameters: "TEST_GROUPS=tftf-l2-fvp-lts-v2.10 tftf-l2-fvp-dynamiq-lts-v2.10"
                    property-file: "tf-a-tests-env.param"

                  - name: "tf-a-lts2.10-ci-gateway"
                    alias: "tftf-l2-extensive-tests-fvp"
                    current-parameters: true
                    kill-phase-on: "NEVER"
                    predefined-parameters: "TEST_GROUPS=tftf-l2-extensive-tests-fvp-lts-v2.10"
                    property-file: "tf-a-tests-env.param"

            - multijob:
                name: "Boot up to the Linux shell prompt"
                condition: "COMPLETED"

                projects:
                  - name: "tf-a-lts2.10-ci-gateway"
                    alias: "tf-l2-boot-tests-aarch32"
                    current-parameters: true
                    kill-phase-on: "NEVER"
                    predefined-parameters: "TEST_GROUPS=tf-l2-boot-tests-aarch32-lts-v2.10"
                    property-file: "tf-a-env.param"

                  - name: "tf-a-lts2.10-ci-gateway"
                    alias: "tf-l2-boot-tests-rootfs"
                    current-parameters: true
                    kill-phase-on: "NEVER"
                    predefined-parameters: "TEST_GROUPS=tf-l2-boot-tests-rootfs-lts-v2.10"
                    property-file: "tf-a-env.param"

                  - name: "tf-a-lts2.10-ci-gateway"
                    alias: "tf-l2-boot-tests-spm-mm"
                    current-parameters: true
                    kill-phase-on: "NEVER"
                    predefined-parameters: "TEST_GROUPS=tf-l2-boot-tests-spm-mm-lts-v2.10"
                    property-file: "tf-a-env.param"

                  - name: "tf-a-lts2.10-ci-gateway"
                    alias: "spm-l2-boot-tests"
                    current-parameters: true
                    kill-phase-on: "NEVER"
                    predefined-parameters: "TEST_GROUPS=spm-l2-boot-tests-lts-v2.10"
                    property-file: "tf-a-env.param"

            - multijob:
                name: "Boot up to the Linux shell prompt - Part 2"
                condition: "COMPLETED"

                projects:
                  - name: "tf-a-lts2.10-ci-gateway"
                    alias: "tf-l2-boot-tests-misc"
                    current-parameters: true
                    kill-phase-on: "NEVER"
                    predefined-parameters: "TEST_GROUPS=tf-l2-boot-tests-misc-lts-v2.10"
                    property-file: "tf-a-env.param"

                  - name: "tf-a-lts2.10-ci-gateway"
                    alias: "tf-l2-boot-tests-latest"
                    current-parameters: true
                    kill-phase-on: "NEVER"
                    predefined-parameters: "TEST_GROUPS=tf-l2-boot-tests-latest-lts-v2.10"
                    property-file: "tf-a-env.param"

                  - name: "tf-a-lts2.10-ci-gateway"
                    alias: "tf-l2-boot-tests-cortex"
                    current-parameters: true
                    kill-phase-on: "NEVER"
                    predefined-parameters: "TEST_GROUPS=tf-l2-boot-tests-cortex-lts-v2.10"
                    property-file: "tf-a-env.param"

                  - name: "tf-a-lts2.10-ci-gateway"
                    alias: "tf-l2-boot-tests-gicv2"
                    current-parameters: true
                    kill-phase-on: "NEVER"
                    predefined-parameters: "TEST_GROUPS=tf-l2-boot-tests-gicv2-lts-v2.10"
                    property-file: "tf-a-env.param"

                  - name: "tf-a-lts2.10-ci-gateway"
                    alias: "tf-l2-boot-tests-bl2_el3"
                    current-parameters: true
                    kill-phase-on: "NEVER"
                    predefined-parameters: "TEST_GROUPS=tf-l2-boot-tests-bl2_el3-lts-v2.10"
                    property-file: "tf-a-env.param"

                  - name: "tf-a-lts2.10-ci-gateway"
                    alias: "qemu-boot-tests"
                    current-parameters: true
                    kill-phase-on: "NEVER"
                    predefined-parameters: "TEST_GROUPS=qemu-boot-tests-lts-v2.10"
                    property-file: "tf-a-env.param"

            - multijob:
                name: "Juno Boot Tests"
                condition: "COMPLETED"

                projects:
                  - name: "tf-a-lts2.10-ci-gateway"
                    alias: "tf-l2-boot-tests-juno"
                    current-parameters: true
                    kill-phase-on: "NEVER"
                    predefined-parameters: "TEST_GROUPS=tf-l2-boot-tests-juno-lts-v2.10"
                    property-file: "tf-a-env.param"

                  - name: "tf-a-lts2.10-ci-gateway"
                    alias: "tftf-l1-juno"
                    current-parameters: true
                    kill-phase-on: "NEVER"
                    predefined-parameters: "TEST_GROUPS=tftf-l1-juno-lts-v2.10"
                    property-file: "tf-a-env.param"

            - multijob:
                name: "Miscellaneous tests"
                condition: "COMPLETED"

                projects:
                  - name: "tf-a-lts2.10-ci-gateway"
                    alias: "tf-l3-boot-tests-css"
                    current-parameters: true
                    kill-phase-on: "NEVER"
                    predefined-parameters: "TEST_GROUPS=tf-l3-boot-tests-css-lts-v2.10"
                    property-file: "tf-a-env.param"

                  - name: "tf-a-lts2.10-ci-gateway"
                    alias: "tf-l3-boot-tests-spm-mm"
                    current-parameters: true
                    kill-phase-on: "NEVER"
                    predefined-parameters: "TEST_GROUPS=tf-l3-boot-tests-spm-mm-lts-v2.10"
                    property-file: "tf-a-env.param"

                  - name: "tf-a-lts2.10-ci-gateway"
                    alias: "tf-l3-boot-tests-ras"
                    current-parameters: true
                    kill-phase-on: "NEVER"
                    predefined-parameters: "TEST_GROUPS=tf-l3-boot-tests-ras-lts-v2.10"
                    property-file: "tf-a-env.param"

                  - name: "tf-a-lts2.10-ci-gateway"
                    alias: "tf-l3-boot-tests-misc"
                    current-parameters: true
                    kill-phase-on: "NEVER"
                    predefined-parameters: "TEST_GROUPS=tf-l3-boot-tests-misc-lts-v2.10"
                    property-file: "tf-a-env.param"

                  - name: "tf-a-lts2.10-ci-gateway"
                    alias: "tf-l3-boot-tests-n1sdp"
                    current-parameters: true
                    kill-phase-on: "NEVER"
                    predefined-parameters: "TEST_GROUPS=tf-l3-boot-tests-n1sdp-lts-v2.10"
                    property-file: "tf-a-env.param"

                  - name: "tf-a-lts2.10-ci-gateway"
                    alias: "spm-l3-boot-tests"
                    current-parameters: true
                    kill-phase-on: "NEVER"
                    predefined-parameters: "TEST_GROUPS=spm-l3-boot-tests-lts-v2.10"
                    property-file: "tf-a-env.param"

                  - name: "tf-a-lts2.10-ci-gateway"
                    alias: "tf-l2-boot-tests-partner-boards"
                    current-parameters: true
                    kill-phase-on: "NEVER"
                    predefined-parameters: "TEST_GROUPS=tf-l2-boot-tests-partner-boards-lts-v2.10"
                    property-file: "tf-a-env.param"

                  # Platform-specific self-tests.
                  # These tests run from the BL31 image then halt the target.
                  - name: "tf-a-lts2.10-ci-gateway"
                    alias: "tf-l2-boot-tests-arm-plats"
                    current-parameters: true
                    kill-phase-on: "NEVER"
                    predefined-parameters: "TEST_GROUPS=tf-l2-boot-tests-arm-plats-lts-v2.10"
                    property-file: "tf-a-env.param"

            - multijob:
                name: "Run doc build check"
                condition: "COMPLETED"

                projects:
                  - name: "tf-a-lts2.10-ci-gateway"
                    alias: "tf-l1-check-docs"
                    current-parameters: true
                    kill-phase-on: "NEVER"
                    predefined-parameters: "TEST_GROUPS=tf-l1-check-docs-lts-v2.10"
                    property-file: "tf-a-env.param"

            - multijob:
                name: "Generate visualizations"
                condition: "COMPLETED"

                projects:
                  - name: "tf-a-sloc-visualization"
                    current-parameters: true
                    kill-phase-on: "NEVER"
                    property-file: "tf-a-env.param"

                  - name: "tf-a-test-category-visualization"
                    current-parameters: true
                    kill-phase-on: "NEVER"
                    property-file: "tf-a-env.param"

                  - name: "tf-a-test-result-visualization"
                    current-parameters: true
                    kill-phase-on: "NEVER"
                    predefined-parameters: "TARGET_BUILD=${{JOB_NAME}}/${{BUILD_NUMBER}}"
                    property-file: "tf-a-env.param"

            # Run the unstable TF-A Tests at the end but do not let their results
            # participate in the job's success/failure.
            - trigger-builds:
                - project: "tf-a-lts2.10-ci-gateway"
                  current-parameters: True
                  property-file: "tf-a-tests-env.param"
                  property-file-fail-on-missing: True
                  predefined-parameters: "TEST_GROUPS=tftf-unstable-lts-v2.10"
                  block: True

                  block-thresholds:
                    build-step-failure-threshold: "never"
                    unstable-threshold: "never"
                    failure-threshold: "never"

    publishers:
      - conditional-publisher:
          - condition-kind: "shell"

            condition-command: |
              ! test -f ${{WORKSPACE}}/TO_BUILD

            action:
              - groovy-postbuild:
                  script: |
                    def currentBuild = Thread.currentThread().executable
                    currentBuild.result = hudson.model.Result.SUCCESS
                    currentBuild.setDescription("There are no new commits in the repositories, skip the build!")

                  on-failure: "nothing"

      - email:
          recipients: "bipin.ravi@arm.com, vwadekar@nvidia.com, yann.gautier@st.com, jidong@google.com, govindraj.raja@arm.com"
