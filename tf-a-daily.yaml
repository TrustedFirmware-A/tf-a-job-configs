- job-template:
    id: "tf-a-daily"
    project-type: "freestyle"

    name: "{base}-daily"
    node: "{node}"

    description: >
      Run daily validation of <strong>{label}</strong>.

    concurrent: false
    disabled: false

    properties:
      - tf-a-ci-scripts:
          download_server_url: "https://downloads.trustedfirmware.org"
          download_server_tf_a_url: "https://downloads.trustedfirmware.org/{downloads_space}"

      - build-discarder:
          days-to-keep: 30

    parameters:
      - tf-a-gerrit-change-based-patchset-parameters:
          gerrit_project: "{gerrit_project_prefix}{gerrit_project}"
          gerrit_branch: "{gerrit_branch}"
          gerrit_refspec: "{gerrit_refspec}"

      - tf-a-builder-parameters:
          tf_a_project: "${{GERRIT_PROJECT}}"
          tf_a_branch: "${{GERRIT_REFSPEC}}"

          rf_a_project: "{rf_a_project}"
          rf_a_branch: "{rf_a_branch}"

          tftf_project: "{tftf_project}"
          tftf_branch: "{tftf_branch}"

          tf_m_tests_project: "{tf_m_tests_project}"
          tf_m_tests_branch: "{tf_m_tests_branch}"

          tf_m_extras_project: "{tf_m_extras_project}"
          tf_m_extras_branch: "{tf_m_extras_branch}"

          hafnium_project: "{hafnium_project}"
          hafnium_branch: "{hafnium_branch}"

          tf_rmm_project: "{tf_rmm_project}"
          tf_rmm_branch: "{tf_rmm_branch}"

          tfut_project: "{tfut_project}"
          tfut_branch: "{tfut_branch}"

          tf_a_ci_scripts_project: "{tf_a_ci_scripts_project}"
          tf_a_ci_scripts_branch: "{tf_a_ci_scripts_branch}"
          tf_a_ci_scripts_mbed_tls_version: "{tf_a_ci_scripts_mbed_tls_version}"

          lava_priority: "low"

    scm:
      - git:
          url: "ssh://review.trustedfirmware.org:29418/ci/tf-a-ci-scripts"
          credentials-id: "TFA_CI_BOT_USER_SSH_KEY"
          basedir: "tf-a-ci-scripts"

          refspec: "+${{CI_REFSPEC}}:refs/remotes/origin/${{CI_REFSPEC}}"
          branches: ["refs/remotes/origin/${{CI_REFSPEC}}"]

          extensions:
            - honor-refspec: true

    wrappers:
      - tf-a-clone-wrappers:
      - timestamps:

    builders:
      - trigger-builds:
          - project:
              - "{base}-main"

            block: true
            block-thresholds:
              build-step-failure-threshold: "never"

            current-parameters: true

      - conditional-step:
          condition-kind: "not"
          on-evaluation-failure: "dont-run"

          condition-operand:
            condition-kind: "regex-match"
            regex: "^lts-v.*$"
            label: "{gerrit_branch}"

          steps:
            - trigger-builds:
                - project:
                    - "tf-a-coverity"

                  block: true
                  block-thresholds:
                    build-step-failure-threshold: "never"

                  current-parameters: true

                - project:
                    - "tf-a-windows-builder"

                  block: true
                  block-thresholds:
                    build-step-failure-threshold: "never"

                  current-parameters: true

      - conditional-step:
          condition-kind: "and"

          condition-operands:
            - condition-kind: "current-status"
              condition-best: "SUCCESS"
              condition-worst: "SUCCESS"

            - condition-kind: "strings-match"
              condition-string1: "{gerrit_refspec}"
              condition-string2: "integration"

          steps:
            - shell: |-
                #!/bin/bash
                echo "Proceed with integration->master fast-forward merge"
                bash "${{WORKSPACE}}/tf-a-ci-scripts/script/scratch_scripts/fast-forward-master.sh"

    triggers:
      - timed: "{daily_schedule}"
