- job-template:
    id: "tf-a-static-checks"
    project-type: "freestyle"

    name: "{base}-static-checks"
    node: "{node}"

    description: |
      Miscellaneous static analysis checks for <strong>{label}</strong>.

    concurrent: true
    disabled: false

    properties:
      - tf-a-ci-scripts:
          download_server_url: "https://downloads.trustedfirmware.org"
          download_server_tf_a_url: "https://downloads.trustedfirmware.org/{downloads_space}"

      - build-discarder:
          days-to-keep: 30

    parameters:
      - tf-a-gerrit-change-based-patchset-parameters:
          gerrit_project: "{gerrit_project}"
          gerrit_branch: "{gerrit_branch}"
          gerrit_refspec: "{gerrit_refspec}"

      - tf-a-builder-parameters:
          tf_a_project: "{tf_a_project}"
          tf_a_branch: "{tf_a_branch}"

          rf_a_project: "{rf_a_project}"
          rf_a_branch: "{rf_a_branch}"

          tftf_project: "{tftf_project}"
          tftf_branch: "{tftf_branch}"

          tf_m_tests_project: "{tf_m_tests_project}"
          tf_m_tests_branch: "{tf_m_tests_branch}"

          tf_m_extras_project: "{tf_m_extras_project}"
          tf_m_extras_branch: "{tf_m_extras_branch}"

          hafnium_project: "{hafnium_project}"
          hafnium_branch: "{hafnium_branch}"

          tf_rmm_project: "{tf_rmm_project}"
          tf_rmm_branch: "{tf_rmm_branch}"

          tfut_project: "{tfut_project}"
          tfut_branch: "{tfut_branch}"

          tf_a_ci_scripts_project: "{tf_a_ci_scripts_project}"
          tf_a_ci_scripts_branch: "{tf_a_ci_scripts_branch}"
          tf_a_ci_scripts_mbed_tls_version: "{tf_a_ci_scripts_mbed_tls_version}"

          lava_priority: "medium"

    scm:
      - git:
          url: "ssh://review.trustedfirmware.org:29418/${{GERRIT_PROJECT}}"
          credentials-id: "TFA_CI_BOT_USER_SSH_KEY"

          refspec: "+${{GERRIT_REFSPEC}}:refs/remotes/origin/${{GERRIT_REFSPEC}}"
          branches: ["refs/remotes/origin/${{GERRIT_REFSPEC}}"]
          basedir: "${{GERRIT_PROJECT}}"

          extensions:
            - honor-refspec: true

      - git:
          url: "ssh://review.trustedfirmware.org:29418/${{CI_GERRIT_PROJECT}}"
          credentials-id: "TFA_CI_BOT_USER_SSH_KEY"
          basedir: "tf-a-ci-scripts"

          refspec: "+${{CI_REFSPEC}}:refs/remotes/origin/${{CI_REFSPEC}}"
          branches: ["refs/remotes/origin/${{CI_REFSPEC}}"]

          changelog-against:
            branch: "master"

          extensions:
            - honor-refspec: true

    wrappers:
      - timestamps:

      - timeout:
          timeout: 240
          fail: true

    builders:
      - inject:
          properties-content: |
            TF_A_STATIC_CHECKS_LOG_PATH=${{GERRIT_PROJECT}}/static-checks.log

      - shell: |
          #!/bin/bash

          set -eux

          export IS_CONTINUOUS_INTEGRATION=1
          export LOG_TEST_FILENAME="${{WORKSPACE}}/${{TF_A_STATIC_CHECKS_LOG_PATH}}"

          # Executed project-related static checks: copyright presence, headers in alphabetical order,
          # line endings, coding style and banned API.
          cd "${{WORKSPACE}}/${{GERRIT_PROJECT}}"
          bash "${{WORKSPACE}}/tf-a-ci-scripts/script/static-checks/static-checks.sh"

      - conditional-step:
          on-evaluation-failure: "dont-run"

          condition-kind: "shell"
          condition-command: |
            echo "${{GERRIT_PROJECT}}" | grep -Eqx "(next/)?TF-A/trusted-firmware-a"

          steps:
            - trigger-builds:
                - project: "{base}-ci-gateway"
                  block: true

                  current-parameters: true
                  predefined-parameters: |
                    TEST_GROUPS={tf_a_ci_scripts_test_project}-l2-analysis-tests-scan-build

    publishers:
      - archive:
          artifacts: "${{TF_A_STATIC_CHECKS_LOG_PATH}}"

      - groovy-postbuild:
          on-failure: "failed"
          sandbox: true

          script: !include-raw-verbatim:
            - "tf-a-static-checks/postbuild.groovy"
