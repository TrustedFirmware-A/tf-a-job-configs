- job:
    name: "tf-a-static-checks"
    node: "docker-amd64-tf-a-jammy"
    project-type: "freestyle"
    concurrent: true
    disabled: false
    description: "Run static checks on Git repository"

    properties:
      - tf-a-ci-scripts:
          download_server_url: "https://downloads.trustedfirmware.org"
          download_server_tf_a_url: "https://downloads.trustedfirmware.org/tf-a"

      - build-discarder:
          days-to-keep: 30

    parameters:
      - tf-a-clone-parameters:
          projects: "trusted-firmware-a,tf-a-ci-scripts,tf-a-tests,tf-m-extras,tf-m-tests,tf-rmm,spm"

      - tf-a-gerrit-change-based-patchset-parameters:
          gerrit_project: "{gerrit_project_prefix}TF-A/trusted-firmware-a"
          gerrit_branch: "master"
          gerrit_refspec: "master"

      - tf-a-builder-parameters:
          tf_a_project: "${{GERRIT_PROJECT}}"
          tf_a_branch: "${{GERRIT_REFSPEC}}"

          rf_a_project: "RF-A/rusted-firmware-a"
          rf_a_branch: "main"

          tftf_project: "TF-A/tf-a-tests"
          tftf_branch: "master"

          tf_m_tests_project: "TF-M/tf-m-tests"
          tf_m_tests_branch: "tfa_ci_dep_revision"

          tf_m_extras_project: "TF-M/tf-m-extras"
          tf_m_extras_branch: "tfa_ci_dep_revision"

          hafnium_project: "hafnium/hafnium"
          hafnium_branch: "master"

          tf_rmm_project: "TF-RMM/tf-rmm"
          tf_rmm_branch: "main"

          tfut_project: "TF-A/tf-a-unit-tests"
          tfut_branch: "main"

          tf_a_ci_scripts_project: "ci/tf-a-ci-scripts"
          tf_a_ci_scripts_branch: "master"
          tf_a_ci_scripts_mbed_tls_version: "3.6.5"

          lava_priority: "medium"

    wrappers:
      - tf-a-clone-wrappers:
      - timestamps:

      - timeout:
          timeout: 240
          fail: true

    builders:
      - tf-a-clone:
          projects: "${{CLONE_REPOS}}"

      - shell: |
          #!/bin/bash
          set -e
          if [[ "${{GERRIT_PROJECT}}" =~ (next/)?TF-A/trusted-firmware-a ]]; then
          cat <<EOF > env.param
          TEST_GROUPS=tf-l2-scan-build
          EOF
          fi
          cd ${{WORKSPACE}}/${{GERRIT_PROJECT}}
          # Executed project-related static checks: copyright presence, headers in alphabetical order,
          # line endings, coding style and banned API.
          IS_CONTINUOUS_INTEGRATION=1 ${{WORKSPACE}}/tf-a-ci-scripts/script/static-checks/static-checks.sh

      - trigger-builds:
          - project: "tf-a-ci-gateway"
            block: true
            property-file: "env.param"
            current-parameters: true
            # Do not trigger tf-a-ci-gateway if env.param file does not exist,
            # which is the case here for TF-A Tests repository
            property-file-fail-on-missing: True

    publishers:
      - archive:
          artifacts: "${{GERRIT_PROJECT}}/static-checks.log"

      - groovy-postbuild:
          script: !include-raw-verbatim:
            - "tf-a-static-checks/postbuild.groovy"
