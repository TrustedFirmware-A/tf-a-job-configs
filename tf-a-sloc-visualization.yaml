- job:
    name: "tf-a-sloc-visualization"
    description: "Generates a visualization of programming languages used by the code-base."
    node: "docker-amd64-tf-a-jammy"
    concurrent: true

    properties:
      - tf-a-ci-scripts:
          download_server_url: "https://downloads.trustedfirmware.org"
          download_server_tf_a_url: "https://downloads.trustedfirmware.org/tf-a"

      - build-discarder:
          days-to-keep: 30

    parameters:
      - string:
          name: "GERRIT_PROJECT"
          default: "{gerrit_project_prefix}TF-A/trusted-firmware-a"

      - string:
          name: "GERRIT_REFSPEC"
          default: "master"

      - string:
          name: "DIRECTORIES"
          default: ". ./drivers ./plat ./tools"
          description: "List of directories to analyze."

    scm:
      - git:
          url: "ssh://review.trustedfirmware.org:29418/${{GERRIT_PROJECT}}"
          credentials-id: "TFA_CI_BOT_USER_SSH_KEY"

          refspec: "+${{GERRIT_REFSPEC}}:refs/remotes/origin/${{GERRIT_REFSPEC}}"
          branches: ["refs/remotes/origin/${{GERRIT_REFSPEC}}"]
          basedir: "trusted-firmware-a"

          extensions:
            - honor-refspec: true

      - git:
          url: "ssh://review.trustedfirmware.org:29418/ci/tf-a-ci-scripts"
          credentials-id: "TFA_CI_BOT_USER_SSH_KEY"

          branches: ["master"]
          basedir: "tf-a-ci-scripts"

    builders:
      - shell: |
          mkdir -p output

          cd trusted-firmware-a &&
            bash ../tf-a-ci-scripts/script/graphs/sloc-viz.bash ${{DIRECTORIES}} \
              > ../output.png 2> ../output.tsv

    publishers:
      - archive:
          artifacts: "output.*"
