- job:
    name: "tf-a-tfut-weekly"
    node: "docker-amd64-tf-a-jammy"
    project-type: "multijob"
    concurrent: true
    disabled: false
    description: "CI job for weekly runs of TF-A Unit Testing"

    properties:
      - tf-a-ci-scripts:
          download_server_url: "https://downloads.trustedfirmware.org"
          download_server_tf_a_url: "https://downloads.trustedfirmware.org/tf-a"

      - build-discarder:
          days-to-keep: 30

    parameters:
      - tf-a-gerrit-change-based-patchset-parameters:
          gerrit_project: "{gerrit_project_prefix}TF-A/trusted-firmware-a"
          gerrit_branch: "master"
          gerrit_refspec: "master"

      - tf-a-builder-parameters:
          tf_a_project: "${{GERRIT_PROJECT}}"
          tf_a_branch: "${{GERRIT_REFSPEC}}"

          lava_priority: "low"

      - string:
          name: "TF_GERRIT_BRANCH"
          default: "master"

      - string:
          name: "TFTF_GERRIT_BRANCH"
          default: "master"

    wrappers:
      - "timestamps"

    builders:
      - multijob:
          name: "TFA UNIT TESTS"
          condition: "COMPLETED"

          projects:
            - name: "tf-a-ci-gateway"
              alias: "tfut"
              current-parameters: true
              kill-phase-on: "NEVER"
              predefined-parameters: "TEST_GROUPS=tfut"

    triggers:
      - timed: "59 23 * * 7"
