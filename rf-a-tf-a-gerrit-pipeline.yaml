- job:
    name: 'rf-a-tf-a-gerrit-pipeline'
    description: 'Run RF-A compatibility validation for TF-A Gerrit changes.'

    project-type: 'pipeline'

    concurrent: true
    sandbox: true

    triggers:
      - gerrit:
          server-name: '{gerrit_host}'

          trigger-on:
            - comment-added-event:
                approval-category: 'Allow-CI'
                approval-value: 2

          projects:
            - project-compare-type: 'PLAIN'
              project-pattern: '{gerrit_project_prefix}TF-A/trusted-firmware-a'

              branches:
                - branch-compare-type: 'PLAIN'
                  branch-pattern: 'integration'

          override-votes: true

          gerrit-build-started-verified-value: 0
          gerrit-build-started-codereview-value: 0

          gerrit-build-successful-verified-value: 0
          gerrit-build-successful-codereview-value: 0

          gerrit-build-failed-verified-value: 0
          gerrit-build-failed-codereview-value: -1

          gerrit-build-unstable-verified-value: 0
          gerrit-build-unstable-codereview-value: -1

          gerrit-build-notbuilt-verified-value: 0
          gerrit-build-notbuilt-codereview-value: 0

    dsl: !include-raw-verbatim:
      - 'vars/core/Gerrit.groovy'
      - 'vars/core/Container.groovy'
      - 'vars/core/ShellQuote.groovy'
      - 'vars/pipelines/GatewayPipeline.groovy'
      - 'rf-a-tf-a-gerrit-pipeline/Jenkinsfile'
