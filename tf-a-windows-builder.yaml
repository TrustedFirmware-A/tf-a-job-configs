- job:
    name: "tf-a-windows-builder"
    node: "tf-a-windows"
    project-type: "matrix"
    concurrent: true
    disabled: false

    description: |
      Trusted Firmware A (TF-A) Windows hosted builder

    properties:
      - throttle:
          enabled: true
          max-per-node: 10
          max-total: 10
          option: "project"

      - build-discarder:
          days-to-keep: 15

    axes:
      - axis:
          name: "DEBUG"
          type: "user-defined"

          values:
            - "0"
            - "1"

      - axis:
          name: "label"
          type: "slave"

          values:
            - "tf-a-windows"

    builders:
      - shell: |
          #!C:\msys64\usr\bin\env.exe OSTYPE="msys" bash -x
          make -j $(nproc) CROSS_COMPILE=aarch64-none-elf- PLAT=fvp DEBUG=$DEBUG V=1 all

    parameters:
      - tf-a-gerrit-change-based-patchset-parameters:
          gerrit_project: "TF-A/trusted-firmware-a"
          gerrit_branch: "master"
          gerrit_refspec: "master"

      - string:
          name: "PARAMS"
          description: "Debug parameters for make"

    wrappers:
      - "timestamps"

      - timeout:
          timeout: 120
          fail: true

    publishers:
      - archive:
          artifacts: "build/**/*"
          excludes: "build/**/*.o,build/**/*.d"

    scm:
      - git:
          url: "ssh://review.trustedfirmware.org:29418/${{GERRIT_PROJECT}}"
          credentials-id: "TFA_CI_BOT_USER_SSH_KEY"

          refspec: "+${{GERRIT_REFSPEC}}:refs/remotes/origin/${{GERRIT_REFSPEC}}"
          branches: ["refs/remotes/origin/${{GERRIT_REFSPEC}}"]

          extensions:
            - honor-refspec: true

          choosing-strategy: "gerrit"
          skip-tag: true
          shallow-clone: true
          wipe-workspace: false
          honor-refspec: true
          allow-empty: true
